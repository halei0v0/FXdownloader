name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ç”ںوˆگç‰ˆوœ¬هڈ·ه¹¶هˆ›ه»؛ Release
  prepare-release:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      build_time: ${{ steps.version.outputs.BUILD_TIME }}
      tag_name: ${{ steps.version.outputs.TAG_NAME }}
      release_id: ${{ steps.create_release.outputs.id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Debug trigger info
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Ref name: ${{ github.ref_name }}"
          echo "SHA: ${{ github.sha }}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate version
        id: version
        run: |
          VERSION=$(date -u +'%Y.%m.%d.%H%M')+$(echo ${{ github.sha }} | cut -c1-7)
          BUILD_TIME=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_NAME="${{ github.ref_name }}"
          else
            TAG_NAME="v$VERSION"
          fi
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"
          echo "Tag name: $TAG_NAME"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG_NAME }}
          name: "FXdownloader ${{ steps.version.outputs.TAG_NAME }}"
          body: |
            ## ًںڑ€ FXdownloader ${{ steps.version.outputs.TAG_NAME }}
            
            ### ًں”„ و‍„ه»؛çٹ¶و€?            
            | ه¹³هڈ° | çٹ¶و€?|
            | :--- | :--- |
            | ًں’» Windows | âڈ?ç¼–è¯‘ن¸?.. |
            | ًں“¦ Windows Standalone | âڈ?ç¼–è¯‘ن¸?.. |
            | ًںگ§ Linux | âڈ?ç¼–è¯‘ن¸?.. |
            | ًںچژ macOS | âڈ?ç¼–è¯‘ن¸?.. |
            | ًں¤– Termux ARM64 | âڈ?ç¼–è¯‘ن¸?.. |
            
            > **ًں’، وڈگç¤؛**: و— éœ€ç­‰ه¾…ه…¨éƒ¨ه®Œوˆگï¼Œو–‡ن»¶ه‡؛çژ°هœ¨ Assets هچ³هڈ¯ن¸‹è½½ن½؟ç”¨م€?            
            ---
            
            ### ًں“‹ و‍„ه»؛ن؟،وپ¯
            | é،¹ç›® | è¯¦وƒ… |
            | :--- | :--- |
            | ًں•’ **ه¼€ه§‹و—¶é—?* | ${{ steps.version.outputs.BUILD_TIME }} |
            | ًںŒ؟ **هˆ†و”¯/Tag** | `${{ github.ref_name }}` |
            | ًں”— **Commit** | `${{ github.sha }}` |
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: [prepare-release]
    if: needs.prepare-release.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows هڈ‘ه¸ƒç‰?          - os: windows-latest
            variant: release
            executable: FXdownloader
            ext: .exe
            release_name: FXdownloader.exe
            artifact_name: FXdownloader-windows-x64
            build_flags: '--windowed'
          # Windows è°ƒè¯•ç‰?          - os: windows-latest
            variant: debug
            executable: FXdownloader-debug
            ext: .exe
            release_name: FXdownloader-debug.exe
            artifact_name: FXdownloader-debug-windows-x64
            build_flags: '--console'
          # Windows Standalone (ه†…ç½® WebView2)
          - os: windows-latest
            variant: release-standalone
            executable: FXdownloader-Standalone
            ext: .exe
            release_name: FXdownloader-Standalone.exe
            artifact_name: FXdownloader-standalone-windows-x64
            build_flags: '--windowed --add-data "WebView2;WebView2"'
          # Linux هڈ‘ه¸ƒç‰?          - os: ubuntu-latest
            variant: release
            executable: FXdownloader
            ext: ''
            release_name: FXdownloader-linux
            artifact_name: FXdownloader-linux-x64
            build_flags: '--windowed'
          # Linux è°ƒè¯•ç‰?          - os: ubuntu-latest
            variant: debug
            executable: FXdownloader-debug
            ext: ''
            release_name: FXdownloader-debug-linux
            artifact_name: FXdownloader-debug-linux-x64
            build_flags: '--console'
          # macOS هڈ‘ه¸ƒç‰?          - os: macos-latest
            variant: release
            executable: FXdownloader
            ext: ''
            release_name: FXdownloader-macos
            artifact_name: FXdownloader-macos-x64
            build_flags: '--windowed'
          # macOS è°ƒè¯•ç‰?          - os: macos-latest
            variant: debug
            executable: FXdownloader-debug
            ext: ''
            release_name: FXdownloader-debug-macos
            artifact_name: FXdownloader-debug-macos-x64
            build_flags: '--console'

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} - ${{ matrix.variant }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libheif1 libheif-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libheif || true

      - name: Update version.py
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          BUILD_TIME="${{ needs.prepare-release.outputs.build_time }}"
          echo "Using version: $VERSION"
          echo "Using build time: $BUILD_TIME"
          
          # ه®Œه…¨é‡چه†™version.pyو–‡ن»¶ï¼Œç،®ن؟‌__build_channel__و­£ç،®è®¾ç½®
          echo "# -*- coding: utf-8 -*-" > version.py
          echo '"""' >> version.py
          echo "ç‰ˆوœ¬ن؟،وپ¯و–‡ن»¶ - GitHub Actionsè‡ھهٹ¨ç”ںوˆگ" >> version.py
          echo '"""' >> version.py
          echo "" >> version.py
          echo "__version__ = \"$VERSION\"" >> version.py
          echo "__author__ = \"Tomato Novel Downloader\"" >> version.py
          echo "__description__ = \"A modern novel downloader with GitHub auto-update support\"" >> version.py
          echo "__github_repo__ = \"POf-L/Fanqie-novel-Downloader\"" >> version.py
          echo "__build_time__ = \"$BUILD_TIME\"" >> version.py
          echo "__build_channel__ = \"github-actions\"" >> version.py
          
          echo "âœ?و›´و–°هگژçڑ„version.py:"
          cat version.py
        shell: bash

      - name: Install dependencies
        run: |
          python -m pip install --prefer-binary -r requirements.txt
          python -m pip install --prefer-binary pyinstaller
        shell: bash

      - name: Download WebView2 Runtime (Standalone only)
        if: matrix.variant == 'release-standalone'
        run: |
          # ن¸‹è½½ WebView2 Fixed Version Runtime (é€ڑè؟‡ NuGet هŒ…èژ·هڈ?
          curl -L -o webview2.zip "https://www.nuget.org/api/v2/package/WebView2.Runtime.X64/129.0.2792.52"
          7z x webview2.zip -oWebView2Temp
          
          # وں¥و‰¾هŒ…هگ« msedgewebview2.exe çڑ„و–‡ن»¶ه¤¹
          TARGET_DIR=$(find WebView2Temp -name "msedgewebview2.exe" | head -n 1 | xargs dirname)
          
          if [ -z "$TARGET_DIR" ]; then
            echo "Error: Could not find msedgewebview2.exe in package"
            # ه°‌è¯•هˆ—ه‡؛و–‡ن»¶ن»¥ن¾›è°ƒè¯•
            find WebView2Temp
            exit 1
          fi
          
          echo "Found runtime at $TARGET_DIR"
          # ç§»هٹ¨هˆ°é،¹ç›®و ¹ç›®ه½•çڑ?WebView2 و–‡ن»¶ه¤?          mv "$TARGET_DIR" ./WebView2
          
          # و¸…çگ†ن¸´و—¶و–‡ن»¶
          rm -rf WebView2Temp webview2.zip
          
          echo "âœ?WebView2 Runtime prepared"
        shell: bash

      - name: Build application (${{ matrix.variant }})
        run: |
          # Determine separator for add-data based on OS
          if [ "${{ runner.os }}" == "Windows" ]; then
            SEP=";"
          else
            SEP=":"
          fi
          
          python -m PyInstaller --onefile \
            --name=${{ matrix.executable }} \
            ${{ matrix.build_flags }} \
            --add-data "static${SEP}static" \
            --add-data "templates${SEP}templates" \
            --hidden-import=flask \
            --hidden-import=flask_cors \
            --hidden-import=webview \
            --hidden-import=PIL \
            --hidden-import=requests \
            --hidden-import=aiohttp \
            --hidden-import=bs4 \
            --hidden-import=ebooklib \
            --hidden-import=fake_useragent \
            --hidden-import=config \
            --hidden-import=version \
            --hidden-import=updater \
            --hidden-import=packaging \
            --hidden-import=packaging.version \
            --collect-data fake_useragent \
            main.py
        shell: bash

      - name: Verify build
        run: |
          ls -la dist/
          target="dist/${{ matrix.executable }}${{ matrix.ext }}"
          if [ -f "$target" ]; then
            echo "âœ?Build successful: $(basename "$target")"
            echo "File size: $(ls -lh "$target" | awk '{print $5}')"
          else
            echo "â‌?Build failed: $(basename "$target") not found"
            exit 1
          fi
        shell: bash

      - name: Rename for release
        run: |
          SRC="dist/${{ matrix.executable }}${{ matrix.ext }}"
          DST="dist/${{ matrix.release_name }}"
          if [ "$SRC" != "$DST" ]; then
            cp "$SRC" "$DST"
          else
            echo "Source and destination are the same, skipping copy"
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.release_name }}
          if-no-files-found: error

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          files: dist/${{ matrix.release_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build completed
        run: echo "âœ?Build and artifact prepared for ${{ matrix.variant }}"

  # Termux ARM64 ه‘½ن»¤è،Œç‰ˆوœ¬و‍„ه»?  build-termux:
    needs: [prepare-release]
    if: needs.prepare-release.result == 'success'
    runs-on: ubuntu-latest
    name: Termux ARM64 CLI

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Update version.py
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          BUILD_TIME="${{ needs.prepare-release.outputs.build_time }}"
          
          echo "# -*- coding: utf-8 -*-" > version.py
          echo '"""' >> version.py
          echo "ç‰ˆوœ¬ن؟،وپ¯و–‡ن»¶ - GitHub Actionsè‡ھهٹ¨ç”ںوˆگ" >> version.py
          echo '"""' >> version.py
          echo "" >> version.py
          echo "__version__ = \"$VERSION\"" >> version.py
          echo "__author__ = \"Tomato Novel Downloader\"" >> version.py
          echo "__description__ = \"A modern novel downloader with GitHub auto-update support\"" >> version.py
          echo "__github_repo__ = \"POf-L/Fanqie-novel-Downloader\"" >> version.py
          echo "__build_time__ = \"$BUILD_TIME\"" >> version.py
          echo "__build_channel__ = \"github-actions-termux\"" >> version.py

      - name: Build Termux ARM64 binary
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          dockerRunArgs: |
            --volume "${PWD}:/workspace"
          install: |
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -q
            # Install build dependencies for Pillow, cffi, and others
            apt-get install -y python3 python3-pip python3-venv python3-dev binutils git build-essential patchelf \
              libjpeg-dev zlib1g-dev libfreetype6-dev liblcms2-dev libopenjp2-7-dev libtiff-dev tk-dev tcl-dev \
              libffi-dev libssl-dev libwebp-dev libxml2-dev libxslt-dev wget
            # ه®‰è£…و–°ç‰ˆ CMake (3.28+) ه› ن¸؛ termux-elf-cleaner éœ€è¦?3.25+
            wget -q https://github.com/Kitware/CMake/releases/download/v3.28.3/cmake-3.28.3-linux-aarch64.tar.gz
            tar -xzf cmake-3.28.3-linux-aarch64.tar.gz -C /opt
            ln -sf /opt/cmake-3.28.3-linux-aarch64/bin/cmake /usr/local/bin/cmake
            rm cmake-3.28.3-linux-aarch64.tar.gz
            cmake --version
            # ن»ژو؛گç پç¼–è¯‘ه®‰è£?termux-elf-cleaner
            git clone https://github.com/termux/termux-elf-cleaner.git /tmp/termux-elf-cleaner
            cd /tmp/termux-elf-cleaner
            mkdir build
            cd build
            cmake ..
            make
            cp termux-elf-cleaner /usr/local/bin/
            cd /
            rm -rf /tmp/termux-elf-cleaner
          run: |
            cd /workspace
            python3 -m venv venv --system-site-packages
            . venv/bin/activate
            # Upgrade build tools
            pip install --upgrade pip setuptools wheel
            # Install dependencies with extended timeout and binary preference
            # Try to find manylinux_aarch64 wheels to avoid compilation on QEMU
            pip install --default-timeout=3600 --prefer-binary -r requirements-termux.txt
            pip install --default-timeout=3600 --prefer-binary pyinstaller
            
            # و‍„ه»؛ه‘½ن»¤è،Œç‰ˆوœ?(ن½؟ç”¨ novel_downloader.py ن½œن¸؛ه…¥هڈ£)
            pyinstaller --onefile \
              --name=FXdownloader-termux \
              --console \
              --hidden-import=requests \
              --hidden-import=aiohttp \
              --hidden-import=PIL \
              --hidden-import=ebooklib \
              --hidden-import=fake_useragent \
              --hidden-import=tqdm \
              --hidden-import=bs4 \
              --hidden-import=config \
              --hidden-import=version \
              --hidden-import=packaging \
              --hidden-import=packaging.version \
              --collect-data fake_useragent \
              --collect-submodules PIL \
              novel_downloader.py
            
            # ن½؟ç”¨ termux-elf-cleaner ن؟®ه¤چ ELF è§£é‡ٹه™¨è·¯ه¾?            termux-elf-cleaner dist/FXdownloader-termux || echo "termux-elf-cleaner warning (non-fatal)"
            
            # هœ¨ه®¹ه™¨ه†…ه®Œوˆگé‡چه‘½هگچï¼Œéپ؟ه…چو‌ƒé™گé—®é¢ک
            cp dist/FXdownloader-termux dist/FXdownloader-termux-arm64
            ls -la dist/

      - name: Verify Termux build
        run: |
          ls -la dist/
          if [ -f "dist/FXdownloader-termux" ]; then
            echo "âœ?Termux ARM64 build successful"
            file dist/FXdownloader-termux
            echo "File size: $(ls -lh dist/FXdownloader-termux | awk '{print $5}')"
          else
            echo "â‌?Termux build failed"
            exit 1
          fi

      - name: Upload Termux artifact
        uses: actions/upload-artifact@v4
        with:
          name: FXdownloader-termux-arm64
          path: dist/FXdownloader-termux-arm64
          if-no-files-found: error

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          files: dist/FXdownloader-termux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Termux build completed
        run: echo "âœ?Termux ARM64 build completed"

  # و‰€وœ‰و‍„ه»؛ه®Œوˆگهگژو›´و–° Release ن؟،وپ¯
  finalize-release:
    name: Finalize Release
    if: always() && github.event_name != 'pull_request' && needs.prepare-release.result == 'success'
    needs: [prepare-release, build, build-termux]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get commit message
        id: get_commit_msg
        run: |
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          git show -s --format='%B' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: 'FXdownloader-*'
          merge-multiple: true

      - name: List all artifacts
        run: |
          ls -laR dist/
          echo "Total size: $(du -sh dist/)"

      - name: Check build results
        id: check_builds
        run: |
          echo "Build job result: ${{ needs.build.result }}"
          echo "Termux job result: ${{ needs.build-termux.result }}"
          
          # هˆ¤و–­وک¯هگ¦ه…¨éƒ¨وˆگهٹں
          ALL_SUCCESS="true"
          BUILD_STATUS=""
          
          if [ "${{ needs.build.result }}" == "success" ]; then
            BUILD_STATUS="âœ?ن¸»و‍„ه»؛ه®Œوˆ?
          else
            BUILD_STATUS="âڑ ï¸ڈ ن¸»و‍„ه»؛éƒ¨هˆ†ه¤±è´?
            ALL_SUCCESS="false"
          fi
          
          if [ "${{ needs.build-termux.result }}" == "success" ]; then
            BUILD_STATUS="$BUILD_STATUS | âœ?Termux و‍„ه»؛ه®Œوˆگ"
          else
            BUILD_STATUS="$BUILD_STATUS | âڑ ï¸ڈ Termux و‍„ه»؛ه¤±è´¥"
            ALL_SUCCESS="false"
          fi
          
          echo "status=$BUILD_STATUS" >> $GITHUB_OUTPUT
          echo "all_success=$ALL_SUCCESS" >> $GITHUB_OUTPUT

      - name: Update Release (all builds successful)
        if: steps.check_builds.outputs.all_success == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          name: FXdownloader ${{ needs.prepare-release.outputs.tag_name }}
          body: |
            ## ًںژ‰ FXdownloader ${{ needs.prepare-release.outputs.tag_name }}
            
            > ${{ steps.get_commit_msg.outputs.msg }}
            
            ---
            
            ### ًں”„ و‍„ه»؛çٹ¶و€?            
            | ه¹³هڈ° | çٹ¶و€?|
            | :--- | :--- |
            | ًں’» Windows | âœ?ه®Œوˆگ |
            | ًں“¦ Windows Standalone | âœ?ه®Œوˆگ |
            | ًںگ§ Linux | âœ?ه®Œوˆگ |
            | ًںچژ macOS | âœ?ه®Œوˆگ |
            | ًں¤– Termux ARM64 | âœ?ه®Œوˆگ |
            
            ---
            
            ### ًں“¥ ن¸‹è½½é€ڑéپ“
            
            | ه¹³هڈ° | وژ¨èچگو–‡ن»¶ | è¯´وکژ |
            | :--- | :--- | :--- |
            | **ًںھں Windows** | `...Standalone.exe` | âœ?**é¦–é€?* (ه†…ç½®è؟گè،Œه؛“ï¼Œه¼€ç®±هچ³ç”? |
            | | `FXdownloader.exe` | ç؛¯ه‡€ç‰?(éœ€è‡ھه¤‡ WebView2) |
            | **ًںگ§ Linux** | `...linux` | x64 و‍¶و‍„ (éœ€ه®‰è£… GTK3/WebKit) |
            | **ًںچژ macOS** | `...macos` | Intel èٹ¯ç‰‡ (x64) |
            | **ًں¤– Termux** | `...termux-arm64` | Android Termux ه‘½ن»¤è،Œç‰ˆ |
            
            ---
            
            ### ًں“‹ و‍„ه»؛ن؟،وپ¯
            | é،¹ç›® | è¯¦وƒ… |
            | :--- | :--- |
            | ًں•’ **و‍„ه»؛و—¶é—´** | ${{ needs.prepare-release.outputs.build_time }} |
            | ًں”— **Commit** | `${{ github.sha }}` |
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Release (some builds failed)
        if: steps.check_builds.outputs.all_success != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          name: "âڑ ï¸ڈ FXdownloader ${{ needs.prepare-release.outputs.tag_name }}"
          body: |
            ## âڑ ï¸ڈ FXdownloader ${{ needs.prepare-release.outputs.tag_name }}
            
            > éƒ¨هˆ†ه¹³هڈ°و‍„ه»؛ه¤±è´¥ï¼Œن½†ه·²ه®Œوˆگçڑ„ç‰ˆوœ¬هڈ¯و­£ه¸¸ن½؟ç”¨م€?            
            ### ًں”„ و‍„ه»؛çٹ¶و€?            
            ${{ steps.check_builds.outputs.status }}
            
            ---
            
            ### ًں“¥ هڈ¯ç”¨ن¸‹è½½
            
            è¯·ن»ژن¸‹و–¹ Assets ن¸­é€‰و‹©ه·²ه®Œوˆگç¼–è¯‘çڑ„ç‰ˆوœ¬ن¸‹è½½م€?            
            ---
            
            ### ًں“‹ و‍„ه»؛ن؟،وپ¯
            | é،¹ç›® | è¯¦وƒ… |
            | :--- | :--- |
            | ًں•’ **و‍„ه»؛و—¶é—´** | ${{ needs.prepare-release.outputs.build_time }} |
            | ًں”— **Commit** | `${{ github.sha }}` |
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
