name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 生成版本号并创建 Release
  prepare-release:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      build_time: ${{ steps.version.outputs.BUILD_TIME }}
      tag_name: ${{ steps.version.outputs.TAG_NAME }}
      release_id: ${{ steps.create_release.outputs.id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Debug trigger info
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Ref name: ${{ github.ref_name }}"
          echo "SHA: ${{ github.sha }}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate version
        id: version
        run: |
          VERSION=$(date -u +'%Y.%m.%d.%H%M')+$(echo ${{ github.sha }} | cut -c1-7)
          BUILD_TIME=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_NAME="${{ github.ref_name }}"
          else
            TAG_NAME="v$VERSION"
          fi
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"
          echo "Tag name: $TAG_NAME"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG_NAME }}
          name: "FXdownloader ${{ steps.version.outputs.TAG_NAME }}"
          body: |
            ## 🚀 FXdownloader ${{ steps.version.outputs.TAG_NAME }}
            
            ### 🔄 构建状�?            
            | 平台 | 状�?|
            | :--- | :--- |
            | 💻 Windows | �?编译�?.. |
            | 📦 Windows Standalone | �?编译�?.. |
            | 🐧 Linux | �?编译�?.. |
            | 🍎 macOS | �?编译�?.. |
            | 🤖 Termux ARM64 | �?编译�?.. |
            
            > **💡 提示**: 无需等待全部完成，文件出现在 Assets 即可下载使用�?            
            ---
            
            ### 📋 构建信息
            | 项目 | 详情 |
            | :--- | :--- |
            | 🕒 **开始时�?* | ${{ steps.version.outputs.BUILD_TIME }} |
            | 🌿 **分支/Tag** | `${{ github.ref_name }}` |
            | 🔗 **Commit** | `${{ github.sha }}` |
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: [prepare-release]
    if: needs.prepare-release.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows 发布版
          - os: windows-latest
            variant: release
            executable: FXdownloader
            ext: .exe
            release_name: FXdownloader.exe
            artifact_name: FXdownloader-windows-x64
            build_flags: '--windowed'
          # Windows 调试版
          - os: windows-latest
            variant: debug
            executable: FXdownloader-debug
            ext: .exe
            release_name: FXdownloader-debug.exe
            artifact_name: FXdownloader-debug-windows-x64
            build_flags: '--console'
          # Windows Standalone (内置 WebView2)
          - os: windows-latest
            variant: release-standalone
            executable: FXdownloader-Standalone
            ext: .exe
            release_name: FXdownloader-Standalone.exe
            artifact_name: FXdownloader-standalone-windows-x64
            build_flags: '--windowed --add-data "WebView2;WebView2"'
          # Linux 发布版
          - os: ubuntu-latest
            variant: release
            executable: FXdownloader
            ext: ''
            release_name: FXdownloader-linux
            artifact_name: FXdownloader-linux-x64
            build_flags: '--windowed'
          # Linux 调试版
          - os: ubuntu-latest
            variant: debug
            executable: FXdownloader-debug
            ext: ''
            release_name: FXdownloader-debug-linux
            artifact_name: FXdownloader-debug-linux-x64
            build_flags: '--console'
          # macOS 发布版
          - os: macos-latest
            variant: release
            executable: FXdownloader
            ext: ''
            release_name: FXdownloader-macos
            artifact_name: FXdownloader-macos-x64
            build_flags: '--windowed'
          # macOS 调试版
          - os: macos-latest
            variant: debug
            executable: FXdownloader-debug
            ext: ''
            release_name: FXdownloader-debug-macos
            artifact_name: FXdownloader-debug-macos-x64
            build_flags: '--console'

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} - ${{ matrix.variant }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libheif1 libheif-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libheif || true

      - name: Update version.py
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          BUILD_TIME="${{ needs.prepare-release.outputs.build_time }}"
          echo "Using version: $VERSION"
          echo "Using build time: $BUILD_TIME"
          
          # 完全重写version.py文件，确保__build_channel__正确设置
          echo "# -*- coding: utf-8 -*-" > version.py
          echo '"""' >> version.py
          echo "版本信息文件 - GitHub Actions自动生成" >> version.py
          echo '"""' >> version.py
          echo "" >> version.py
          echo "__version__ = \"$VERSION\"" >> version.py
          echo "__author__ = \"FXdownloader\"" >> version.py
          echo "__description__ = \"A modern novel downloader with GitHub auto-update support\"" >> version.py
          echo "__github_repo__ = \"halei0v0/FXdownloader\"" >> version.py
          echo "__build_time__ = \"$BUILD_TIME\"" >> version.py
          echo "__build_channel__ = \"github-actions\"" >> version.py
          
          echo "�?更新后的version.py:"
          cat version.py
        shell: bash

      - name: Install dependencies
        run: |
          python -m pip install --prefer-binary -r requirements.txt
          python -m pip install --prefer-binary pyinstaller
        shell: bash

      - name: Download WebView2 Runtime (Standalone only)
        if: matrix.variant == 'release-standalone'
        run: |
          # 下载 WebView2 Fixed Version Runtime (通过 NuGet 包获�?
          curl -L -o webview2.zip "https://www.nuget.org/api/v2/package/WebView2.Runtime.X64/129.0.2792.52"
          7z x webview2.zip -oWebView2Temp
          
          # 查找包含 msedgewebview2.exe 的文件夹
          TARGET_DIR=$(find WebView2Temp -name "msedgewebview2.exe" | head -n 1 | xargs dirname)
          
          if [ -z "$TARGET_DIR" ]; then
            echo "Error: Could not find msedgewebview2.exe in package"
            # 尝试列出文件以供调试
            find WebView2Temp
            exit 1
          fi
          
          echo "Found runtime at $TARGET_DIR"
          # 移动到项目根目录�?WebView2 文件�?          mv "$TARGET_DIR" ./WebView2
          
          # 清理临时文件
          rm -rf WebView2Temp webview2.zip
          
          echo "�?WebView2 Runtime prepared"
        shell: bash

      - name: Build application (${{ matrix.variant }})
        run: |
          # Determine separator for add-data based on OS
          if [ "${{ runner.os }}" == "Windows" ]; then
            SEP=";"
          else
            SEP=":"
          fi
          
          python -m PyInstaller --onefile \
            --name=${{ matrix.executable }} \
            ${{ matrix.build_flags }} \
            --add-data "static${SEP}static" \
            --add-data "templates${SEP}templates" \
            --hidden-import=flask \
            --hidden-import=flask_cors \
            --hidden-import=webview \
            --hidden-import=PIL \
            --hidden-import=requests \
            --hidden-import=aiohttp \
            --hidden-import=bs4 \
            --hidden-import=ebooklib \
            --hidden-import=fake_useragent \
            --hidden-import=config \
            --hidden-import=version \
            --hidden-import=updater \
            --hidden-import=packaging \
            --hidden-import=packaging.version \
            --collect-data fake_useragent \
            main.py
        shell: bash

      - name: Verify build
        run: |
          ls -la dist/
          target="dist/${{ matrix.executable }}${{ matrix.ext }}"
          if [ -f "$target" ]; then
            echo "�?Build successful: $(basename "$target")"
            echo "File size: $(ls -lh "$target" | awk '{print $5}')"
          else
            echo "�?Build failed: $(basename "$target") not found"
            exit 1
          fi
        shell: bash

      - name: Rename for release
        run: |
          SRC="dist/${{ matrix.executable }}${{ matrix.ext }}"
          DST="dist/${{ matrix.release_name }}"
          if [ "$SRC" != "$DST" ]; then
            cp "$SRC" "$DST"
          else
            echo "Source and destination are the same, skipping copy"
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.release_name }}
          if-no-files-found: error

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          files: dist/${{ matrix.release_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build completed
        run: echo "�?Build and artifact prepared for ${{ matrix.variant }}"

  # Termux ARM64 命令行版本构�?  build-termux:
    needs: [prepare-release]
    if: needs.prepare-release.result == 'success'
    runs-on: ubuntu-latest
    name: Termux ARM64 CLI

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Update version.py
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          BUILD_TIME="${{ needs.prepare-release.outputs.build_time }}"
          
          echo "# -*- coding: utf-8 -*-" > version.py
          echo '"""' >> version.py
          echo "版本信息文件 - GitHub Actions自动生成" >> version.py
          echo '"""' >> version.py
          echo "" >> version.py
          echo "__version__ = \"$VERSION\"" >> version.py
          echo "__author__ = \"FXdownloader\"" >> version.py
          echo "__description__ = \"A modern novel downloader with GitHub auto-update support\"" >> version.py
          echo "__github_repo__ = \"halei0v0/FXdownloader\"" >> version.py
          echo "__build_time__ = \"$BUILD_TIME\"" >> version.py
          echo "__build_channel__ = \"github-actions-termux\"" >> version.py

      - name: Build Termux ARM64 binary
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          dockerRunArgs: |
            --volume "${PWD}:/workspace"
          install: |
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -q
            # Install build dependencies for Pillow, cffi, and others
            apt-get install -y python3 python3-pip python3-venv python3-dev binutils git build-essential patchelf \
              libjpeg-dev zlib1g-dev libfreetype6-dev liblcms2-dev libopenjp2-7-dev libtiff-dev tk-dev tcl-dev \
              libffi-dev libssl-dev libwebp-dev libxml2-dev libxslt-dev wget
            # 安装新版 CMake (3.28+) 因为 termux-elf-cleaner 需�?3.25+
            wget -q https://github.com/Kitware/CMake/releases/download/v3.28.3/cmake-3.28.3-linux-aarch64.tar.gz
            tar -xzf cmake-3.28.3-linux-aarch64.tar.gz -C /opt
            ln -sf /opt/cmake-3.28.3-linux-aarch64/bin/cmake /usr/local/bin/cmake
            rm cmake-3.28.3-linux-aarch64.tar.gz
            cmake --version
            # 从源码编译安�?termux-elf-cleaner
            git clone https://github.com/termux/termux-elf-cleaner.git /tmp/termux-elf-cleaner
            cd /tmp/termux-elf-cleaner
            mkdir build
            cd build
            cmake ..
            make
            cp termux-elf-cleaner /usr/local/bin/
            cd /
            rm -rf /tmp/termux-elf-cleaner
          run: |
            cd /workspace
            python3 -m venv venv --system-site-packages
            . venv/bin/activate
            # Upgrade build tools
            pip install --upgrade pip setuptools wheel
            # Install dependencies with extended timeout and binary preference
            # Try to find manylinux_aarch64 wheels to avoid compilation on QEMU
            pip install --default-timeout=3600 --prefer-binary -r requirements-termux.txt
            pip install --default-timeout=3600 --prefer-binary pyinstaller
            
            # 构建命令行版�?(使用 novel_downloader.py 作为入口)
            pyinstaller --onefile \
              --name=FXdownloader-termux \
              --console \
              --hidden-import=requests \
              --hidden-import=aiohttp \
              --hidden-import=PIL \
              --hidden-import=ebooklib \
              --hidden-import=fake_useragent \
              --hidden-import=tqdm \
              --hidden-import=bs4 \
              --hidden-import=config \
              --hidden-import=version \
              --hidden-import=packaging \
              --hidden-import=packaging.version \
              --collect-data fake_useragent \
              --collect-submodules PIL \
              novel_downloader.py
            
            # 使用 termux-elf-cleaner 修复 ELF 解释器路�?            termux-elf-cleaner dist/FXdownloader-termux || echo "termux-elf-cleaner warning (non-fatal)"
            
            # 在容器内完成重命名，避免权限问题
            cp dist/FXdownloader-termux dist/FXdownloader-termux-arm64
            ls -la dist/

      - name: Verify Termux build
        run: |
          ls -la dist/
          if [ -f "dist/FXdownloader-termux" ]; then
            echo "�?Termux ARM64 build successful"
            file dist/FXdownloader-termux
            echo "File size: $(ls -lh dist/FXdownloader-termux | awk '{print $5}')"
          else
            echo "�?Termux build failed"
            exit 1
          fi

      - name: Upload Termux artifact
        uses: actions/upload-artifact@v4
        with:
          name: FXdownloader-termux-arm64
          path: dist/FXdownloader-termux-arm64
          if-no-files-found: error

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          files: dist/FXdownloader-termux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Termux build completed
        run: echo "�?Termux ARM64 build completed"

  # 所有构建完成后更新 Release 信息
  finalize-release:
    name: Finalize Release
    if: always() && github.event_name != 'pull_request' && needs.prepare-release.result == 'success'
    needs: [prepare-release, build, build-termux]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get commit message
        id: get_commit_msg
        run: |
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          git show -s --format='%B' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: 'FXdownloader-*'
          merge-multiple: true

      - name: List all artifacts
        run: |
          ls -laR dist/
          echo "Total size: $(du -sh dist/)"

      - name: Check build results
        id: check_builds
        run: |
          echo "Build job result: ${{ needs.build.result }}"
          echo "Termux job result: ${{ needs.build-termux.result }}"
          
          # 判断是否全部成功
          ALL_SUCCESS="true"
          BUILD_STATUS=""
          
          if [ "${{ needs.build.result }}" == "success" ]; then
            BUILD_STATUS="�?主构建完�?
          else
            BUILD_STATUS="⚠️ 主构建部分失�?
            ALL_SUCCESS="false"
          fi
          
          if [ "${{ needs.build-termux.result }}" == "success" ]; then
            BUILD_STATUS="$BUILD_STATUS | �?Termux 构建完成"
          else
            BUILD_STATUS="$BUILD_STATUS | ⚠️ Termux 构建失败"
            ALL_SUCCESS="false"
          fi
          
          echo "status=$BUILD_STATUS" >> $GITHUB_OUTPUT
          echo "all_success=$ALL_SUCCESS" >> $GITHUB_OUTPUT

      - name: Update Release (all builds successful)
        if: steps.check_builds.outputs.all_success == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          name: FXdownloader ${{ needs.prepare-release.outputs.tag_name }}
          body: |
            ## 🎉 FXdownloader ${{ needs.prepare-release.outputs.tag_name }}
            
            > ${{ steps.get_commit_msg.outputs.msg }}
            
            ---
            
            ### 🔄 构建状�?            
            | 平台 | 状�?|
            | :--- | :--- |
            | 💻 Windows | �?完成 |
            | 📦 Windows Standalone | �?完成 |
            | 🐧 Linux | �?完成 |
            | 🍎 macOS | �?完成 |
            | 🤖 Termux ARM64 | �?完成 |
            
            ---
            
            ### 📥 下载通道
            
            | 平台 | 推荐文件 | 说明 |
            | :--- | :--- | :--- |
            | **🪟 Windows** | `...Standalone.exe` | �?**首�?* (内置运行库，开箱即�? |
            | | `FXdownloader.exe` | 纯净�?(需自备 WebView2) |
            | **🐧 Linux** | `...linux` | x64 架构 (需安装 GTK3/WebKit) |
            | **🍎 macOS** | `...macos` | Intel 芯片 (x64) |
            | **🤖 Termux** | `...termux-arm64` | Android Termux 命令行版 |
            
            ---
            
            ### 📋 构建信息
            | 项目 | 详情 |
            | :--- | :--- |
            | 🕒 **构建时间** | ${{ needs.prepare-release.outputs.build_time }} |
            | 🔗 **Commit** | `${{ github.sha }}` |
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Release (some builds failed)
        if: steps.check_builds.outputs.all_success != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          name: "⚠️ FXdownloader ${{ needs.prepare-release.outputs.tag_name }}"
          body: |
            ## ⚠️ FXdownloader ${{ needs.prepare-release.outputs.tag_name }}
            
            > 部分平台构建失败，但已完成的版本可正常使用�?            
            ### 🔄 构建状�?            
            ${{ steps.check_builds.outputs.status }}
            
            ---
            
            ### 📥 可用下载
            
            请从下方 Assets 中选择已完成编译的版本下载�?            
            ---
            
            ### 📋 构建信息
            | 项目 | 详情 |
            | :--- | :--- |
            | 🕒 **构建时间** | ${{ needs.prepare-release.outputs.build_time }} |
            | 🔗 **Commit** | `${{ github.sha }}` |
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
