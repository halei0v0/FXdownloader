/* ====================================================================
   更新小说 Update Novel (Feature #2)
   ==================================================================== */
async function updateNovel() {
    if (!state.novelId) {
        showToast('请先选择小说', 'warning');
        return;
    }
    showToast('正在检查更新...', 'info');
    try {
        const sourceKey = getSelectedSourceKey();
        const result = await window.pywebview.api.update_novel(state.novelId, sourceKey);
        if (result && result.error) {
            showToast('更新检查失败: ' + result.error, 'error');
            addLog('更新检查失败: ' + result.error, 'error');
            return;
        }
        const newCount = result.new_count || (result.new_chapters ? result.new_chapters.length : 0);
        const incompleteCount = result.incomplete_count || (result.incomplete_chapters ? result.incomplete_chapters.length : 0);

        if (newCount === 0 && incompleteCount === 0) {
            showToast('已是最新，内容完整', 'success');
            addLog('已是最新章节，内容完整', 'info');
            return;
        }

        // 有新章节或章节列表未加载时，重新加载章节列表
        if (newCount > 0 || state.chapters.length === 0) {
            await loadChapters();
        }

        // 仅选中需要下载的章节：新章节 + 缺失章节（避免重复下载已完成内容）
        clearSelection();
        const newIds = (result.new_chapters || []).map(c => String(c.chapter_id));
        const incompleteIds = (result.incomplete_chapters || []).map(c => String(c.chapter_id));
        const selectSet = new Set(newIds.concat(incompleteIds));
        const incompleteSet = new Set(incompleteIds);

        document.querySelectorAll('.chapter-checkbox').forEach(cb => {
            const cid = String(cb.dataset.chapterId);
            if (selectSet.has(cid)) {
                const item = cb.closest('.chapter-item');
                cb.checked = true;
                if (item) {
                    item.classList.add('selected');
                    if (incompleteSet.has(cid)) item.classList.add('failed');
                }
                state.selectedChapters.add(cid);
            }
        });
        updateChapterCount();
        // 进入补全模式：用户直接点下载时将追加到已有文件而非覆盖
        state.supplementMode = true;

        // 提示信息
        if (newCount > 0 && incompleteCount > 0) {
            showToast('发现 ' + newCount + ' 个新章节，并检测到 ' + incompleteCount + ' 章内容缺失（已自动选中）', 'warning');
            addLog('发现 ' + newCount + ' 个新章节；另有 ' + incompleteCount + ' 章内容缺失已自动选中，可点击下载补全', 'warning');
        } else if (newCount > 0) {
            showToast('发现 ' + newCount + ' 个新章节，已自动选中', 'success');
            addLog('发现 ' + newCount + ' 个新章节，已自动选中（仅新章节）', 'success');
        } else if (incompleteCount > 0) {
            showToast('检测到 ' + incompleteCount + ' 章内容缺失，已自动选中，可点击下载补全', 'warning');
            addLog('检测到 ' + incompleteCount + ' 章内容缺失已自动选中', 'warning');
        }
    } catch (e) {
        showToast('更新失败: ' + (e.message || e), 'error');
        addLog('更新异常: ' + (e.message || e), 'error');
    }
}

/* ====================================================================
   章节范围选择 Chapter Range (Feature #7)
   ==================================================================== */
function applyChapterRange() {
    if (state.chapters.length === 0) {
        showToast('请先加载章节', 'warning');
        return;
    }
    const startInput = document.getElementById('rangeStart');
    const endInput = document.getElementById('rangeEnd');
    let start = parseInt(startInput.value);
    let end = parseInt(endInput.value);
    if (isNaN(start)) start = 1;
    if (isNaN(end)) end = state.chapters.length;
    start = Math.max(1, Math.min(state.chapters.length, start));
    end = Math.max(1, Math.min(state.chapters.length, end));
    if (start > end) { const t = start; start = end; end = t; }
    state.selectedChapters.clear();
    for (let i = start - 1; i <= end - 1 && i < state.chapters.length; i++) {
        state.selectedChapters.add(state.chapters[i].chapter_id);
    }
    syncChapterCheckboxes();
    updateChapterCount();
    showToast('已选择第 ' + start + '-' + end + ' 章', 'info');
}

function selectFirst100() {
    if (state.chapters.length === 0) { showToast('请先加载章节', 'warning'); return; }
    const count = Math.min(100, state.chapters.length);
    state.selectedChapters.clear();
    for (let i = 0; i < count; i++) state.selectedChapters.add(state.chapters[i].chapter_id);
    syncChapterCheckboxes();
    updateChapterCount();
    showToast('已选择前 ' + count + ' 章', 'info');
}

function selectLast100() {
    if (state.chapters.length === 0) { showToast('请先加载章节', 'warning'); return; }
    const count = Math.min(100, state.chapters.length);
    const startIdx = state.chapters.length - count;
    state.selectedChapters.clear();
    for (let i = startIdx; i < state.chapters.length; i++) state.selectedChapters.add(state.chapters[i].chapter_id);
    syncChapterCheckboxes();
    updateChapterCount();
    showToast('已选择后 ' + count + ' 章', 'info');
}

function selectLatest50() {
    if (state.chapters.length === 0) { showToast('请先加载章节', 'warning'); return; }
    const count = Math.min(50, state.chapters.length);
    const startIdx = state.chapters.length - count;
    state.selectedChapters.clear();
    for (let i = startIdx; i < state.chapters.length; i++) state.selectedChapters.add(state.chapters[i].chapter_id);
    syncChapterCheckboxes();
    updateChapterCount();
    showToast('已选择最新 ' + count + ' 章', 'info');
}

function syncChapterCheckboxes() {
    document.querySelectorAll('.chapter-checkbox').forEach(cb => {
        const id = cb.dataset.chapterId;
        if (state.selectedChapters.has(id)) {
            cb.checked = true;
            cb.closest('.chapter-item').classList.add('selected');
        } else {
            cb.checked = false;
            cb.closest('.chapter-item').classList.remove('selected');
        }
    });
    state.supplementMode = false;
}

/* ====================================================================
   阅读器 Reader (Feature #4)
   ==================================================================== */
async function openReader() {
    if (!state.novelId || state.chapters.length === 0) {
        showToast('请先加载小说章节', 'warning');
        return;
    }
    // 加载保存的阅读器设置（字号+主题）
    await loadReaderSettings();
    document.getElementById('readerNovelTitle').textContent = state.novelTitle;
    document.getElementById('readerOverlay').classList.add('active');
    renderReaderSidebar();
    applyReaderFontSize();
    applyReaderTheme();
    // 初始化连续滚动状态
    state.reading.loadedChapters = new Set();
    state.reading.isLoadingMore = false;
    state.reading.endReachedShown = false;
    resetReaderContent();
    setupReaderScrollListener();
    // 从上次阅读位置恢复
    let startIndex = 0;
    let startChapterId = state.chapters[0].chapter_id;
    try {
        const progress = await window.pywebview.api.get_reading_progress(state.novelId);
        if (progress && progress.last_chapter_id) {
            const idx = state.chapters.findIndex(ch => ch.chapter_id == progress.last_chapter_id);
            if (idx >= 0) {
                startIndex = idx;
                startChapterId = state.chapters[idx].chapter_id;
            }
        }
    } catch (e) { /* 忽略 */ }
    await readChapterById(startChapterId);
}

function closeReader() {
    stopTTS();
    document.getElementById('readerOverlay').classList.remove('active');
}

function renderReaderSidebar() {
    const sidebar = document.getElementById('readerSidebar');
    sidebar.innerHTML = '';
    const fragment = document.createDocumentFragment();
    state.chapters.forEach((ch, idx) => {
        const item = document.createElement('div');
        item.className = 'reader-chapter-item';
        item.textContent = ch.chapter_title;
        item.title = ch.chapter_title;
        item.dataset.index = idx;
        item.addEventListener('click', function() {
            readChapterById(ch.chapter_id);
        });
        fragment.appendChild(item);
    });
    sidebar.appendChild(fragment);
}

/* 连续滚动阅读：加载单个章节并追加到内容区末尾
   - 已加载则不重复加载
   - 加载完成后自动尝试再加载下一章（内容过短未填满视口时） */
async function appendChapterBlock(idx) {
    if (idx < 0 || idx >= state.chapters.length) return;
    if (!state.reading.loadedChapters) state.reading.loadedChapters = new Set();
    if (state.reading.loadedChapters.has(idx)) return;
    const ch = state.chapters[idx];
    if (!ch) return;
    const chapterId = ch.chapter_id;
    const sourceKey = getSelectedSourceKey();
    const contentArea = document.getElementById('readerContent');

    state.reading.isLoadingMore = true;
    // 占位加载提示
    const placeholder = document.createElement('div');
    placeholder.className = 'reader-loading-more';
    placeholder.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><span>加载下一章...</span></div>';
    contentArea.appendChild(placeholder);
    try {
        const result = await window.pywebview.api.read_chapter(state.novelId, chapterId, sourceKey);
        placeholder.remove();
        if (result && result.error) {
            const errDiv = document.createElement('div');
            errDiv.className = 'reader-chapter-block reader-chapter-error';
            errDiv.dataset.index = idx;
            errDiv.innerHTML = '<h2>' + escapeHtml(ch.chapter_title) + '</h2>' +
                '<p style="color:var(--error);text-align:center;">加载失败: ' + escapeHtml(result.error) + '</p>';
            contentArea.appendChild(errDiv);
            state.reading.loadedChapters.add(idx);
            return;
        }
        const title = result.title || ch.chapter_title;
        const content = result.content || '';
        const block = document.createElement('div');
        block.className = 'reader-chapter-block';
        block.dataset.index = idx;
        block.dataset.chapterId = chapterId;
        block.innerHTML = '<h2>' + escapeHtml(title) + '</h2>' + renderChapterContent(content);
        contentArea.appendChild(block);
        state.reading.loadedChapters.add(idx);
    } catch (e) {
        placeholder.remove();
        const errDiv = document.createElement('div');
        errDiv.className = 'reader-chapter-block reader-chapter-error';
        errDiv.dataset.index = idx;
        errDiv.innerHTML = '<h2>' + escapeHtml(ch.chapter_title) + '</h2>' +
            '<p style="color:var(--error);text-align:center;">加载失败: ' + escapeHtml(e.message || e) + '</p>';
        contentArea.appendChild(errDiv);
        state.reading.loadedChapters.add(idx);
    } finally {
        state.reading.isLoadingMore = false;
        // 内容可能很短未填满视口，尝试加载下一章
        maybeLoadNextChapterOnScroll();
    }
}

/* 清空阅读内容区，重置已加载章节集合 */
function resetReaderContent() {
    const contentArea = document.getElementById('readerContent');
    if (contentArea) {
        contentArea.innerHTML = '';
        contentArea.scrollTop = 0;
    }
    if (state.reading.loadedChapters) state.reading.loadedChapters.clear();
    state.reading.endReachedShown = false;
}

/* 滚动到指定章节块（如果已加载） */
function scrollToChapterBlock(idx) {
    const contentArea = document.getElementById('readerContent');
    const block = contentArea.querySelector('.reader-chapter-block[data-index="' + idx + '"]');
    if (block) {
        block.scrollIntoView({ block: 'start', behavior: 'auto' });
    } else {
        contentArea.scrollTop = 0;
    }
}

/* 加载章节：已加载则滚动定位，未加载则重置内容区仅显示该章 */
async function readChapterById(chapterId) {
    if (!state.novelId) return;
    const idx = state.chapters.findIndex(ch => ch.chapter_id == chapterId);
    if (idx < 0) return;
    if (state.tts.active) stopTTS();
    // 已加载：直接滚动定位
    if (state.reading.loadedChapters && state.reading.loadedChapters.has(idx)) {
        scrollToChapterBlock(idx);
        state.reading.currentChapterIndex = idx;
        updateReaderSidebarActive();
        updateReaderNavButtons();
        document.getElementById('readerChapterInfo').textContent = '第 ' + (idx + 1) + '/' + state.chapters.length + ' 章';
        saveReadingProgress(chapterId, state.chapters[idx].chapter_title, idx);
        return;
    }
    // 未加载：重置内容区，仅加载该章节作为新起点
    resetReaderContent();
    await appendChapterBlock(idx);
    scrollToChapterBlock(idx);
    state.reading.currentChapterIndex = idx;
    updateReaderSidebarActive();
    updateReaderNavButtons();
    document.getElementById('readerChapterInfo').textContent = '第 ' + (idx + 1) + '/' + state.chapters.length + ' 章';
    saveReadingProgress(chapterId, state.chapters[idx].chapter_title, idx);
}

function renderChapterContent(content) {
    if (!content) return '<p>（无内容）</p>';
    return content.split(/\n+/).filter(p => p.trim()).map(p => '<p>' + escapeHtml(p) + '</p>').join('');
}

function updateReaderSidebarActive() {
    const items = document.querySelectorAll('.reader-chapter-item');
    items.forEach((item, idx) => {
        if (idx === state.reading.currentChapterIndex) {
            item.classList.add('active');
            item.scrollIntoView({ block: 'nearest' });
        } else {
            item.classList.remove('active');
        }
    });
}

function updateReaderNavButtons() {
    document.getElementById('readerPrevBtn').disabled = state.reading.currentChapterIndex <= 0;
    document.getElementById('readerNextBtn').disabled = state.reading.currentChapterIndex >= state.chapters.length - 1;
}

function nextChapter() {
    const idx = state.reading.currentChapterIndex + 1;
    if (idx >= state.chapters.length) return;
    if (state.tts.active) stopTTS();
    // 已加载则平滑滚动到下一章；否则重置加载
    if (state.reading.loadedChapters && state.reading.loadedChapters.has(idx)) {
        scrollToChapterBlock(idx);
        state.reading.currentChapterIndex = idx;
        updateReaderSidebarActive();
        updateReaderNavButtons();
        document.getElementById('readerChapterInfo').textContent = '第 ' + (idx + 1) + '/' + state.chapters.length + ' 章';
        const ch = state.chapters[idx];
        saveReadingProgress(ch.chapter_id, ch.chapter_title, idx);
    } else {
        readChapterById(state.chapters[idx].chapter_id);
    }
}

function prevChapter() {
    const idx = state.reading.currentChapterIndex - 1;
    if (idx < 0) return;
    if (state.tts.active) stopTTS();
    if (state.reading.loadedChapters && state.reading.loadedChapters.has(idx)) {
        scrollToChapterBlock(idx);
        state.reading.currentChapterIndex = idx;
        updateReaderSidebarActive();
        updateReaderNavButtons();
        document.getElementById('readerChapterInfo').textContent = '第 ' + (idx + 1) + '/' + state.chapters.length + ' 章';
        const ch = state.chapters[idx];
        saveReadingProgress(ch.chapter_id, ch.chapter_title, idx);
    } else {
        readChapterById(state.chapters[idx].chapter_id);
    }
}

/* ============== 连续滚动：滚动监听 + 自动加载下一章 ============== */
let _readerScrollListenerAttached = false;
let _readerScrollRaf = null;

function setupReaderScrollListener() {
    if (_readerScrollListenerAttached) return;
    const contentArea = document.getElementById('readerContent');
    if (!contentArea) return;
    contentArea.addEventListener('scroll', onReaderScroll, { passive: true });
    _readerScrollListenerAttached = true;
}

function onReaderScroll() {
    if (_readerScrollRaf) return;
    _readerScrollRaf = requestAnimationFrame(() => {
        _readerScrollRaf = null;
        updateCurrentChapterFromScroll();
        maybeLoadNextChapterOnScroll();
    });
}

/* 根据滚动位置更新当前章节索引（用于侧栏高亮/进度保存） */
function updateCurrentChapterFromScroll() {
    const contentArea = document.getElementById('readerContent');
    if (!contentArea) return;
    const blocks = contentArea.querySelectorAll('.reader-chapter-block');
    if (blocks.length === 0) return;
    const scrollTop = contentArea.scrollTop;
    let currentIdx = -1;
    blocks.forEach(block => {
        const blockTop = block.offsetTop;
        // block 顶部进入视口顶部区域即视为当前章节
        if (blockTop - scrollTop <= 80) {
            const idx = parseInt(block.dataset.index, 10);
            if (!isNaN(idx) && (currentIdx === -1 || idx > currentIdx)) {
                currentIdx = idx;
            }
        }
    });
    if (currentIdx === -1) {
        currentIdx = parseInt(blocks[0].dataset.index, 10);
        if (isNaN(currentIdx)) return;
    }
    if (currentIdx !== state.reading.currentChapterIndex) {
        state.reading.currentChapterIndex = currentIdx;
        updateReaderSidebarActive();
        updateReaderNavButtons();
        document.getElementById('readerChapterInfo').textContent = '第 ' + (currentIdx + 1) + '/' + state.chapters.length + ' 章';
        const ch = state.chapters[currentIdx];
        if (ch) saveReadingProgress(ch.chapter_id, ch.chapter_title, currentIdx);
    }
}

/* 接近底部时自动加载下一章 */
function maybeLoadNextChapterOnScroll() {
    if (state.reading.isLoadingMore) return;
    if (!state.reading.loadedChapters || state.reading.loadedChapters.size === 0) return;
    const contentArea = document.getElementById('readerContent');
    if (!contentArea) return;
    const { scrollTop, scrollHeight, clientHeight } = contentArea;
    // 距底部不足 800px 时预加载下一章
    if (scrollHeight - scrollTop - clientHeight > 800) return;
    // 找到最后一个已加载的章节索引
    let lastIdx = -1;
    state.reading.loadedChapters.forEach(i => { if (i > lastIdx) lastIdx = i; });
    const nextIdx = lastIdx + 1;
    if (nextIdx < state.chapters.length) {
        appendChapterBlock(nextIdx);
    } else if (lastIdx === state.chapters.length - 1 && !state.reading.endReachedShown) {
        state.reading.endReachedShown = true;
        const endDiv = document.createElement('div');
        endDiv.className = 'reader-loading-more reader-end-tip';
        endDiv.textContent = '已读完所有章节';
        contentArea.appendChild(endDiv);
    }
}

function changeFontSize(delta) {
    // 字号范围 12-36（支持更大字号）
    state.reading.fontSize = Math.max(12, Math.min(36, state.reading.fontSize + delta));
    applyReaderFontSize();
    saveReaderSettings();
}

function applyReaderFontSize() {
    document.getElementById('readerContent').style.fontSize = state.reading.fontSize + 'px';
    document.getElementById('readerFontSize').textContent = state.reading.fontSize;
}

/* 切换护眼/深色背景 */
function toggleReaderTheme() {
    state.reading.theme = state.reading.theme === 'eye-care' ? 'dark' : 'eye-care';
    applyReaderTheme();
    saveReaderSettings();
}

function applyReaderTheme() {
    const overlay = document.getElementById('readerOverlay');
    const label = document.getElementById('readerThemeLabel');
    const btn = document.getElementById('readerThemeBtn');
    if (!overlay) return;
    if (state.reading.theme === 'eye-care') {
        overlay.classList.add('eye-care');
        if (label) label.textContent = '护眼';
        if (btn) btn.classList.add('active');
    } else {
        overlay.classList.remove('eye-care');
        if (label) label.textContent = '深色';
        if (btn) btn.classList.remove('active');
    }
}

/* 保存阅读器设置（字号+主题）到后端 config */
async function saveReaderSettings() {
    try {
        await window.pywebview.api.save_reader_settings(
            JSON.stringify({
                font_size: state.reading.fontSize,
                theme: state.reading.theme,
            })
        );
    } catch (e) { /* 忽略 */ }
}

/* 从后端加载阅读器设置 */
async function loadReaderSettings() {
    try {
        const s = await window.pywebview.api.get_reader_settings();
        if (s) {
            if (typeof s.font_size === 'number') {
                state.reading.fontSize = Math.max(12, Math.min(36, s.font_size));
            }
            if (s.theme === 'eye-care' || s.theme === 'dark') {
                state.reading.theme = s.theme;
            }
        }
    } catch (e) { /* 忽略，使用默认 */ }
}

async function saveReadingProgress(chapterId, chapterTitle, chapterIndex) {
    if (!state.novelId) return;
    try {
        await window.pywebview.api.save_reading_progress(
            state.novelId, state.novelTitle, chapterId, chapterTitle, chapterIndex, 0
        );
    } catch (e) { /* 忽略 */ }
}

/* ====================================================================
   语音朗读 (TTS) - 基于 edge-tts 在线生成
   流程：取当前章节 → 切句并包裹 span → 逐句调用后端生成 mp3 → 播放 → 高亮+滚动
   ==================================================================== */
let _ttsVoicesLoaded = false;
const _ttsAudioCache = {};  // 句子音频缓存 {sentenceIdx: base64Audio}，减少句间停顿
const _ttsInflight = {};    // 进行中的请求去重 {sentenceIdx: Promise}

/* 角色音色池（云希 zh-CN-YunxiNeural 留给旁白，不参与角色分配）*/
const _ttsMaleCharVoices = ['zh-CN-YunjianNeural', 'zh-CN-YunyangNeural']; // 云健, 云扬
const _ttsFemaleCharVoices = [
    'zh-CN-XiaoxiaoNeural', 'zh-CN-XiaoyiNeural', 'zh-CN-XiaobeiNeural',
    'zh-CN-XiaochenNeural', 'zh-CN-XiaohanNeural', 'zh-CN-XiaomengNeural',
    'zh-CN-XiaomoNeural', 'zh-CN-XiaoqiuNeural', 'zh-CN-XiaoruiNeural',
    'zh-CN-XiaoshuangNeural', 'zh-CN-XiaoxuanNeural', 'zh-CN-XiaoyanNeural',
    'zh-CN-XiaozhenNeural',
];

/* 名字用字性别启发式判断 */
function guessCharGender(name) {
    if (!name) return 'female';
    if (name === '他' || name === '我') return 'male';
    if (name === '她') return 'female';
    const femaleChars = '婷雅雪梅兰芳丽花草红霞凤英玲燕雯静敏娜娟娇妹姐姑娘妇妈';
    const maleChars = '刚强勇虎龙军海山峰磊斌波涛鹏飞彪锋铁钢哥弟叔伯爷汉子伯公';
    let f = 0, m = 0;
    for (const c of name) {
        if (femaleChars.includes(c)) f++;
        if (maleChars.includes(c)) m++;
    }
    if (f > m) return 'female';
    if (m > f) return 'male';
    return 'female'; // 默认女声（池子大）
}

/* 为角色分配不冲突的音色（同角色复用，新角色取池中下一个） */
function getCharVoice(charName, gender) {
    if (state.tts.charVoices[charName]) return state.tts.charVoices[charName];
    let voice;
    if (gender === 'male') {
        voice = _ttsMaleCharVoices[state.tts.malePoolIdx % _ttsMaleCharVoices.length];
        state.tts.malePoolIdx++;
    } else {
        voice = _ttsFemaleCharVoices[state.tts.femalePoolIdx % _ttsFemaleCharVoices.length];
        state.tts.femalePoolIdx++;
    }
    state.tts.charVoices[charName] = voice;
    state.tts.charGenders[charName] = gender;
    return voice;
}

/* 重置角色音色映射（切换章节/关闭角色模式时调用） */
function resetCharVoices() {
    state.tts.charVoices = {};
    state.tts.charGenders = {};
    state.tts.malePoolIdx = 0;
    state.tts.femalePoolIdx = 0;
}

function clearTTSCache() {
    for (const k in _ttsAudioCache) delete _ttsAudioCache[k];
    for (const k in _ttsInflight) delete _ttsInflight[k];
}

/* 请求单句音频（带缓存+去重），返回 base64 或 null */
function fetchTTSAudio(idx) {
    if (_ttsAudioCache[idx]) return Promise.resolve(_ttsAudioCache[idx]);
    if (_ttsInflight[idx]) return _ttsInflight[idx];
    const item = state.tts.sentences[idx];
    if (!item || !item.text) return Promise.resolve(null);
    const voice = item.voice || state.tts.voice; // 优先使用句子专属音色（角色模式）
    const rate = ttsRateStr();
    const chapterIdx = state.tts.chapterIdx;
    const p = window.pywebview.api.tts_generate(item.text, voice, rate)
        .then(result => {
            delete _ttsInflight[idx];
            if (state.tts.chapterIdx !== chapterIdx) return null; // 章节已切换
            if (result && result.status === 'ok' && result.audio) {
                _ttsAudioCache[idx] = result.audio;
                return result.audio;
            }
            return null;
        })
        .catch(() => { delete _ttsInflight[idx]; return null; });
    _ttsInflight[idx] = p;
    return p;
}

/* 预获取下一句音频（fire-and-forget），减少句间停顿 */
function prefetchTTS(idx) {
    if (idx < 0 || idx >= state.tts.sentences.length) return;
    fetchTTSAudio(idx);
}

async function loadTTSVoices() {
    if (_ttsVoicesLoaded) return;
    const select = document.getElementById('ttsVoiceSelect');
    select.innerHTML = '<option value="">加载中…</option>';
    try {
        const voices = await window.pywebview.api.tts_list_voices();
        if (voices && voices.error) {
            select.innerHTML = '<option value="">' + voices.error + '</option>';
            return;
        }
        select.innerHTML = '';
        (voices || []).forEach(v => {
            const opt = document.createElement('option');
            opt.value = v.id;
            opt.textContent = v.name;
            select.appendChild(opt);
        });
        if (state.tts.voice) select.value = state.tts.voice;
        _ttsVoicesLoaded = true;
    } catch (e) {
        select.innerHTML = '<option value="">音色加载失败</option>';
    }
}

/* 语速倍数 → edge-tts rate 字符串（1.0x = +0%） */
function ttsRateStr() {
    const pct = Math.round((state.tts.rate - 1) * 100);
    return (pct >= 0 ? '+' : '') + pct + '%';
}

function onTTSRateChange() {
    const v = parseFloat(document.getElementById('ttsRateSlider').value);
    state.tts.rate = v;
    document.getElementById('ttsRateLabel').textContent = v.toFixed(1) + 'x';
    clearTTSCache(); // 语速变化，旧缓存失效
}

function onTTSVoiceChange() {
    state.tts.voice = document.getElementById('ttsVoiceSelect').value;
    clearTTSCache(); // 音色变化，旧缓存失效
}

/* 切换角色识别模式：开启时旁白用云希、角色按性别分配音色；关闭时统一使用所选音色 */
function onTTSRoleModeChange() {
    state.tts.roleMode = document.getElementById('ttsRoleModeChk').checked;
    clearTTSCache();
    resetCharVoices();
    // 若正在朗读，重新准备句子列表
    if (state.tts.active) {
        const wasPlaying = state.tts.playing;
        stopTTS();
        if (wasPlaying) setTimeout(() => startTTS(), 100);
    }
}

/* 对话解析：将段落切分为 [旁白/对话] 片段，识别说话人和性别
   返回 [{text, role: null | {name, gender}}, ...]
   - role=null 表示旁白
   - 无主语的对话延续上一个说话人 */
const _ttsSpeakVerbs = '回答|说|道|问|答|喊|叫|笑|骂|吼|叹|言';
const _ttsSpeakerBeforeRe = new RegExp('([\\u4e00-\\u9fa5]{1,8}?|他|她|我)(?:对[\\u4e00-\\u9fa5]{1,8}?)?(?:笑(?:着|了)?|冷冷地|淡淡地|大声|低声|冷声)?(?:' + _ttsSpeakVerbs + ')(?:道|着)?[:：]?\\s*$');
const _ttsSpeakerAfterRe = new RegExp('^\\s*[，,。！？\\s]*([\\u4e00-\\u9fa5]{1,8}?|他|她|我)(?:对[\\u4e00-\\u9fa5]{1,8}?)?(?:笑(?:着|了)?|冷冷地|淡淡地|大声|低声|冷声)?(?:' + _ttsSpeakVerbs + ')(?:道|着)?[:：]?');

function parseDialogueSegments(text) {
    const segments = [];
    // 匹配引号内容（支持 “”""「」『』）
    const quoteRe = /([“"「『])([^“”"」』]*?)([”"」』])/g;
    let lastEnd = 0, m;
    let lastSpeaker = null;
    while ((m = quoteRe.exec(text)) !== null) {
        const quoteStart = m.index;
        const quoteContent = m[2].trim();
        const quoteEnd = m.index + m[0].length;
        const before = text.slice(lastEnd, quoteStart);
        // 引号后到下一引号/句末的文本
        const rest = text.slice(quoteEnd);
        const nextQ = rest.search(/[“"「『]/);
        const afterEnd = nextQ === -1 ? text.length : quoteEnd + nextQ;
        const after = text.slice(quoteEnd, afterEnd);

        // 旁白部分（引号前）
        if (before.trim()) segments.push({text: before.trim(), role: null});

        // 识别说话人
        let speaker = null, gender = null;
        const mBefore = before.match(_ttsSpeakerBeforeRe);
        const mAfter = after.match(_ttsSpeakerAfterRe);
        if (mBefore) {
            speaker = mBefore[1];
            gender = (speaker === '他') ? 'male' : (speaker === '她') ? 'female' : null;
        } else if (mAfter) {
            speaker = mAfter[1];
            gender = (speaker === '他') ? 'male' : (speaker === '她') ? 'female' : null;
        }
        if (speaker && !gender) {
            // 名字用字判断，结合上下文代词
            const ctxPron = /她/.test(before + after) && !/他/.test(before + after) ? 'female'
                         : /他/.test(before + after) && !/她/.test(before + after) ? 'male'
                         : null;
            gender = ctxPron || guessCharGender(speaker);
        }
        if (speaker) {
            lastSpeaker = {name: speaker, gender: gender};
        } else if (lastSpeaker) {
            speaker = lastSpeaker.name;
            gender = lastSpeaker.gender;
        }

        if (quoteContent) {
            segments.push({
                text: quoteContent,
                role: speaker ? {name: speaker, gender: gender} : null,
            });
        }
        lastEnd = quoteEnd;
    }
    // 尾部旁白
    if (lastEnd < text.length) {
        const tail = text.slice(lastEnd).trim();
        if (tail) segments.push({text: tail, role: null});
    }
    return segments;
}

/* 切分朗读单元：每个段落整体作为一句，仅超长时按逗号/字数二次切分
   （避免按句号细切导致句间停顿、不连贯） */
function splitSentences(text) {
    if (!text) return [];
    text = text.replace(/\s+/g, ' ').trim();
    if (!text) return [];
    const result = [text];
    // 二次切分：超过 150 字的长段按逗号/顿号再切（避免 edge-tts 超时）
    const final = [];
    result.forEach(s => {
        if (s.length <= 150) { final.push(s); return; }
        const sub = s.split(/([，,、；;：:]+)/).filter(x => x);
        let buf = '';
        for (const part of sub) {
            if ((buf + part).length > 150 && buf) {
                final.push(buf);
                buf = part;
            } else {
                buf += part;
            }
        }
        if (buf) {
            // 仍超长（无逗号分隔的长串），按 150 字硬切分
            if (buf.length > 150) {
                for (let i = 0; i < buf.length; i += 150) {
                    final.push(buf.slice(i, i + 150));
                }
            } else {
                final.push(buf);
            }
        }
    });
    return final.filter(s => s);
}

function getChapterBlock(idx) {
    return document.querySelector('#readerContent .reader-chapter-block[data-index="' + idx + '"]');
}

/* 准备当前章节的句子：把每个 <p> 的文本切句并包裹 <span class="tts-sentence">
   角色模式开启时：解析对话/旁白，为每句分配角色音色或旁白音色（云希）*/
function prepareTTSentences(chapterIdx) {
    const block = getChapterBlock(chapterIdx);
    if (!block || block.classList.contains('reader-chapter-error')) return false;
    const paragraphs = block.querySelectorAll('p');
    if (!paragraphs.length) return false;
    clearTTSCache(); // 新章节句子列表，清空旧缓存
    resetCharVoices(); // 新章节重置角色音色映射
    const sentences = [];
    paragraphs.forEach(p => {
        const raw = p.dataset.ttsOriginal || (p.textContent || '');
        if (!raw.trim()) return;
        p.dataset.ttsOriginal = raw;
        p.textContent = '';
        if (state.tts.roleMode) {
            // 角色模式：解析对话片段，每片段再按长度切分
            const dialogueSegs = parseDialogueSegments(raw);
            dialogueSegs.forEach(dseg => {
                const subSegs = splitSentences(dseg.text);
                let voice;
                if (dseg.role) {
                    voice = getCharVoice(dseg.role.name, dseg.role.gender);
                } else {
                    voice = state.tts.narrationVoice; // 旁白用云希
                }
                subSegs.forEach(subText => {
                    const span = document.createElement('span');
                    span.className = 'tts-sentence';
                    span.textContent = subText;
                    if (dseg.role) span.title = dseg.role.name; // tooltip 显示角色名
                    p.appendChild(span);
                    sentences.push({ text: subText, span: span, voice: voice, role: dseg.role });
                });
            });
        } else {
            // 普通模式：整段切分，统一使用选定音色
            const segs = splitSentences(raw);
            segs.forEach(seg => {
                const span = document.createElement('span');
                span.className = 'tts-sentence';
                span.textContent = seg;
                p.appendChild(span);
                sentences.push({ text: seg, span: span, voice: state.tts.voice });
            });
        }
    });
    state.tts.sentences = sentences;
    state.tts.currentIdx = 0;
    state.tts.chapterIdx = chapterIdx;
    return sentences.length > 0;
}

/* 恢复段落为纯文本（清除 span 包裹） */
function restoreTTSParagraphs(block) {
    if (!block) return;
    block.querySelectorAll('p').forEach(p => {
        if (p.dataset.ttsOriginal !== undefined) {
            p.textContent = p.dataset.ttsOriginal;
            delete p.dataset.ttsOriginal;
        }
    });
}

function clearTTSHighlight() {
    document.querySelectorAll('.tts-sentence.tts-current').forEach(s => s.classList.remove('tts-current'));
}

function highlightSentence(idx) {
    clearTTSHighlight();
    const item = state.tts.sentences[idx];
    if (!item || !item.span) return;
    item.span.classList.add('tts-current');
    scrollTTSIntoView(item.span);
}

/* 滚动使句子在阅读区视口居中 */
function scrollTTSIntoView(span) {
    const contentArea = document.getElementById('readerContent');
    if (!contentArea) return;
    const spanRect = span.getBoundingClientRect();
    const areaRect = contentArea.getBoundingClientRect();
    const spanAbsTop = (spanRect.top - areaRect.top) + contentArea.scrollTop;
    const target = spanAbsTop - contentArea.clientHeight / 2 + spanRect.height / 2;
    contentArea.scrollTo({ top: Math.max(0, target), behavior: 'smooth' });
}

function setTTSStatus(text) {
    const el = document.getElementById('ttsStatus');
    if (el) el.textContent = text;
}

/* 刷新控制条按钮状态与图标 */
function updateTTSUI() {
    const bar = document.getElementById('ttsControlBar');
    const btn = document.getElementById('readerTtsBtn');
    const label = document.getElementById('readerTtsLabel');
    const playIcon = document.getElementById('ttsPlayIcon');
    const prevBtn = document.getElementById('ttsPrevBtn');
    const nextBtn = document.getElementById('ttsNextBtn');
    if (state.tts.active) {
        bar.classList.add('active');
        btn.classList.add('active');
        label.textContent = state.tts.playing ? '朗读中' : '已暂停';
    } else {
        bar.classList.remove('active');
        btn.classList.remove('active');
        label.textContent = '朗读';
    }
    // 播放/暂停图标
    if (state.tts.playing) {
        playIcon.innerHTML = '<rect x="3" y="2" width="3" height="10" rx="0.5"/><rect x="8" y="2" width="3" height="10" rx="0.5"/>';
    } else {
        playIcon.innerHTML = '<path d="M3 2v10l8-5z"/>';
    }
    prevBtn.disabled = !state.tts.active || state.tts.currentIdx <= 0;
    nextBtn.disabled = !state.tts.active;
}

/* 切换：未启动→启动；播放中→暂停；暂停中→恢复 */
async function toggleTTS() {
    if (state.tts.active && state.tts.playing) {
        pauseTTS();
        return;
    }
    if (state.tts.active && !state.tts.playing) {
        resumeTTS();
        return;
    }
    await startTTS();
}

async function startTTS() {
    await loadTTSVoices();
    const chapterIdx = state.reading.currentChapterIndex;
    if (chapterIdx < 0 || chapterIdx >= state.chapters.length) {
        showToast('请先选择章节', 'warning');
        return;
    }
    const block = getChapterBlock(chapterIdx);
    if (!block) {
        showToast('章节内容未加载', 'warning');
        return;
    }
    if (!prepareTTSentences(chapterIdx)) {
        showToast('本章无可朗读内容', 'warning');
        return;
    }
    try { await window.pywebview.api.tts_reset_cancel(); } catch (e) { /* 忽略 */ }
    state.tts.active = true;
    state.tts.playing = true;
    state.tts.genToken++;
    setTTSStatus('朗读中…');
    updateTTSUI();
    playNextSentence();
}

function pauseTTS() {
    state.tts.playing = false;
    state.tts.genToken++; // 丢弃进行中的生成
    if (state.tts.audio) {
        state.tts.audio.pause();
    }
    setTTSStatus('已暂停');
    updateTTSUI();
}

function resumeTTS() {
    state.tts.playing = true;
    state.tts.genToken++;
    setTTSStatus('朗读中…');
    updateTTSUI();
    if (state.tts.audio && !state.tts.audio.ended) {
        state.tts.audio.play().catch(() => {});
    } else {
        state.tts.audio = null;
        playNextSentence();
    }
}

async function stopTTS() {
    try { await window.pywebview.api.tts_stop(); } catch (e) { /* 忽略 */ }
    state.tts.active = false;
    state.tts.playing = false;
    state.tts.genToken++;
    if (state.tts.audio) {
        state.tts.audio.onended = null;
        state.tts.audio.onerror = null;
        state.tts.audio.pause();
        state.tts.audio.src = '';
        state.tts.audio = null;
    }
    clearTTSHighlight();
    clearTTSCache();
    restoreTTSParagraphs(getChapterBlock(state.tts.chapterIdx));
    state.tts.sentences = [];
    state.tts.currentIdx = 0;
    state.tts.chapterIdx = -1;
    state.tts.loadingVoice = false;
    setTTSStatus('就绪');
    updateTTSUI();
}

/* 朗读下一句：生成音频并播放，结束后递归（带预缓存减少句间停顿） */
async function playNextSentence() {
    if (!state.tts.active) return;
    if (state.tts.currentIdx >= state.tts.sentences.length) {
        await onTTSChapterEnd();
        return;
    }
    if (!state.tts.playing) return; // 暂停中
    const item = state.tts.sentences[state.tts.currentIdx];
    if (!item || !item.text) {
        state.tts.currentIdx++;
        playNextSentence();
        return;
    }
    const idx = state.tts.currentIdx;
    const token = state.tts.genToken;
    const total = state.tts.sentences.length;
    highlightSentence(idx);

    // 释放上一个音频元素的内存（src 置空触发 GC）
    if (state.tts.audio) {
        state.tts.audio.onended = null;
        state.tts.audio.onerror = null;
        state.tts.audio.src = '';
        state.tts.audio = null;
    }

    // 查缓存或发起请求（fetchTTSAudio 自带缓存+去重）
    const cached = _ttsAudioCache[idx];
    if (!cached) setTTSStatus(`生成中… (${idx + 1}/${total})`);
    state.tts.loadingVoice = !cached;
    updateTTSUI();

    let audioData;
    try {
        audioData = await fetchTTSAudio(idx);
    } catch (e) {
        if (token !== state.tts.genToken) return;
        state.tts.loadingVoice = false;
        setTTSStatus('生成失败');
        updateTTSUI();
        return;
    }
    if (token !== state.tts.genToken) return; // 已被取消/跳转
    state.tts.loadingVoice = false;
    if (!state.tts.active || !state.tts.playing) return; // 已停止或暂停
    if (!audioData) {
        setTTSStatus('生成失败，跳过');
        updateTTSUI();
        state.tts.currentIdx++;
        setTimeout(() => playNextSentence(), 200);
        return;
    }

    // 预获取下一句音频（后台请求，减少下一句的等待）
    prefetchTTS(idx + 1);

    setTTSStatus(`朗读中 (${idx + 1}/${total})`);
    updateTTSUI();
    // 播放音频
    const audio = new Audio('data:audio/mp3;base64,' + audioData);
    state.tts.audio = audio;
    audio.onended = () => {
        if (token !== state.tts.genToken) return;
        delete _ttsAudioCache[idx];
        state.tts.currentIdx++;
        playNextSentence(); // 无延迟直接衔接下一句
    };
    audio.onerror = () => {
        if (token !== state.tts.genToken) return;
        setTTSStatus('播放失败，跳过');
        delete _ttsAudioCache[idx];
        state.tts.currentIdx++;
        setTimeout(() => playNextSentence(), 200);
    };
    try {
        await audio.play();
    } catch (e) {
        if (token !== state.tts.genToken) return;
        setTTSStatus('播放失败: ' + (e.message || e));
        updateTTSUI();
    }
}

/* 当前章节朗读完毕：按"自动续读"加载下一章或结束 */
async function onTTSChapterEnd() {
    clearTTSHighlight();
    const autoNext = document.getElementById('ttsAutoNextChk').checked;
    const nextIdx = state.tts.chapterIdx + 1;
    if (!autoNext || nextIdx >= state.chapters.length) {
        // 恢复当前章节段落
        restoreTTSParagraphs(getChapterBlock(state.tts.chapterIdx));
        state.tts.active = false;
        state.tts.playing = false;
        state.tts.sentences = [];
        state.tts.currentIdx = 0;
        setTTSStatus(autoNext ? '全书朗读完毕' : '本章朗读完毕');
        updateTTSUI();
        return;
    }
    setTTSStatus('加载下一章…');
    updateTTSUI();
    restoreTTSParagraphs(getChapterBlock(state.tts.chapterIdx));
    // 未加载则追加加载
    if (!state.reading.loadedChapters.has(nextIdx)) {
        await appendChapterBlock(nextIdx);
    }
    if (!state.tts.active) return; // 期间被停止
    const block = getChapterBlock(nextIdx);
    if (!block) {
        // 加载失败，跳过
        state.tts.chapterIdx = nextIdx;
        state.tts.sentences = [];
        onTTSChapterEnd();
        return;
    }
    // 滚动到下一章并更新进度
    scrollToChapterBlock(nextIdx);
    state.reading.currentChapterIndex = nextIdx;
    updateReaderSidebarActive();
    updateReaderNavButtons();
    document.getElementById('readerChapterInfo').textContent = '第 ' + (nextIdx + 1) + '/' + state.chapters.length + ' 章';
    const ch = state.chapters[nextIdx];
    if (ch) saveReadingProgress(ch.chapter_id, ch.chapter_title, nextIdx);
    if (!prepareTTSentences(nextIdx)) {
        // 空章节/加载失败，推进章节索引后递归跳到再下一章
        state.tts.chapterIdx = nextIdx;
        state.tts.sentences = [];
        onTTSChapterEnd();
        return;
    }
    setTTSStatus('朗读中…');
    updateTTSUI();
    playNextSentence();
}

/* 跳转上一句/下一句 */
function ttsJump(dir) {
    if (!state.tts.active) return;
    const newIdx = state.tts.currentIdx + dir;
    state.tts.genToken++; // 丢弃当前生成
    if (state.tts.audio) {
        state.tts.audio.pause();
        state.tts.audio.onended = null;
        state.tts.audio.onerror = null;
        state.tts.audio.src = '';
        state.tts.audio = null;
    }
    state.tts.loadingVoice = false;
    if (newIdx < 0) {
        state.tts.currentIdx = 0;
        highlightSentence(0);
        setTTSStatus(state.tts.playing ? '生成中…' : '已暂停');
        updateTTSUI();
        if (state.tts.playing) playNextSentence();
        return;
    }
    if (newIdx >= state.tts.sentences.length) {
        state.tts.currentIdx = state.tts.sentences.length;
        onTTSChapterEnd();
        return;
    }
    state.tts.currentIdx = newIdx;
    highlightSentence(newIdx);
    setTTSStatus(state.tts.playing ? '生成中…' : '已暂停');
    updateTTSUI();
    if (state.tts.playing) playNextSentence();
}

// ---- 涟漪效果：为按钮添加点击波纹 ----
function createRipple(e) {
    const button = e.currentTarget;
    const ripple = document.createElement('span');
    ripple.className = 'ripple';

    const rect = button.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);

    // 适配鼠标点击和触摸
    const x = (e.clientX || (e.touches && e.touches[0].clientX) || rect.left + rect.width / 2) - rect.left - size / 2;
    const y = (e.clientY || (e.touches && e.touches[0].clientY) || rect.top + rect.height / 2) - rect.top - size / 2;

    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = x + 'px';
    ripple.style.top = y + 'px';

    button.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
}

// 为所有按钮添加涟漪效果
document.addEventListener('click', function(e) {
    const btn = e.target.closest('.btn-download, .search-btn, .btn-modal-save, .btn-modal-cancel, .novel-action-btn.primary, .grid-card-btn.primary');
    if (btn && btn.style.position !== 'static') {
        createRipple({ currentTarget: btn, clientX: e.clientX, clientY: e.clientY });
    }
});

// ---- 章节列表交错入场动画 ----
function applyStaggeredAnimation() {
    const items = document.querySelectorAll('.chapter-item');
    items.forEach((item, index) => {
        // 每项延迟 20ms，最多 800ms
        const delay = Math.min(index * 20, 800);
        item.style.animationDelay = delay + 'ms';
    });
}

// 监听章节列表 DOM 变化，自动应用交错动画
const chapterListObserver = new MutationObserver(function(mutations) {
    mutations.forEach(function(mutation) {
        if (mutation.addedNodes.length > 0) {
            applyStaggeredAnimation();
        }
    });
});

// 初始观察章节列表容器
const chapterListEl = document.getElementById('chapterList');
if (chapterListEl) {
    chapterListObserver.observe(chapterListEl, { childList: true });
}

// ---- 视图切换时的渐入动画 ----
const originalSwitchView = window.switchView;
if (typeof originalSwitchView === 'function') {
    window.switchView = function(viewName) {
        originalSwitchView(viewName);
        // 为新视图内容添加渐入动画
        setTimeout(() => {
            const activeView = document.querySelector('.view.active');
            if (activeView) {
                const cards = activeView.querySelectorAll('.novel-grid-card, .list-item, .category-chip');
                cards.forEach((el, i) => {
                    el.style.animation = 'none';
                    void el.offsetWidth; // 触发重排
                    el.style.animation = `fadeInUp 0.4s ease backwards`;
                    el.style.animationDelay = Math.min(i * 50, 600) + 'ms';
                });
            }
        }, 50);
    };
}

// ---- 鼠标视差效果（轻微跟随鼠标移动） ----
let parallaxRAF = null;
document.addEventListener('mousemove', function(e) {
    if (parallaxRAF) cancelAnimationFrame(parallaxRAF);
    parallaxRAF = requestAnimationFrame(() => {
        const orbs = document.querySelectorAll('.aurora-orb');
        const mouseX = (e.clientX / window.innerWidth - 0.5) * 30;
        const mouseY = (e.clientY / window.innerHeight - 0.5) * 30;
        orbs.forEach((orb, i) => {
            const factor = (i + 1) * 0.3;
            orb.style.setProperty('--parallax-x', mouseX * factor + 'px');
            orb.style.setProperty('--parallax-y', mouseY * factor + 'px');
        });
    });
});

// ---- 卡片 3D 倾斜效果 ----
document.addEventListener('mousemove', function(e) {
    const card = e.target.closest('.novel-grid-card');
    if (!card) return;

    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const centerX = rect.width / 2;
    const centerY = rect.height / 2;
    const rotateX = (y - centerY) / centerY * -5;
    const rotateY = (x - centerX) / centerX * 5;

    card.style.transform = `translateY(-6px) scale(1.02) perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});

document.addEventListener('mouseout', function(e) {
    const card = e.target.closest('.novel-grid-card');
    if (card && !e.relatedTarget?.closest('.novel-grid-card')) {
        card.style.transform = '';
    }
});

</script>
