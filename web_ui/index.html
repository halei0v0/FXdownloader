/** 后台预获取封面并更新已渲染的卡片图片 */
async function prefetchAndApplyCovers(items, grid) {
    // 找出没有封面的书
    const needCovers = items.filter(n => !n.cover_url);
    if (needCovers.length === 0) return;
    try {
        addLog('正在获取封面: ' + needCovers.length + ' 本...', 'info');
        const coversJson = JSON.stringify(needCovers.map(n => ({
            novel_id: n.novel_id,
            title: n.title,
            cover_url: n.cover_url || '',
            source_key: n.source_key || n.source || 'biquge',
        })));
        const covers = await window.pywebview.api.prefetch_covers(coversJson, 'biquge');
        if (!covers) return;
        // 更新已渲染的卡片图片
        Object.keys(covers).forEach(novelId => {
            const url = covers[novelId];
            if (!url) return;
            // 找到对应卡片中的占位符，替换为图片
            const card = grid.querySelector('.novel-grid-card[data-novel-id="' + novelId + '"]');
            if (!card) return;
            const ph = card.querySelector('.grid-card-cover-placeholder');
            if (ph) {
                const img = document.createElement('img');
                img.className = 'grid-card-cover';
                img.src = url;
                img.onerror = function() {
                    // 加载失败保持占位符
                };
                ph.replaceWith(img);
            }
        });
        addLog('封面获取完成', 'success');
    } catch (e) {
        console.warn('封面预获取失败:', e);
    }
}

async function loadCategories() {
    const section = document.getElementById('categoriesSection');
    try {
        const result = await window.pywebview.api.get_categories();
        if (!result || result.length === 0) {
            section.innerHTML = '<span style="color:var(--text-muted);font-size:12px;">暂无分类</span>';
            return;
        }
        section.innerHTML = '';
        result.forEach(src => {
            if (src.categories) {
                src.categories.forEach(cat => {
                    const chip = document.createElement('span');
                    chip.className = 'category-chip';
                    chip.textContent = cat.name;
                    chip.title = (src.source_name || src.source || '') + ' - ' + cat.name;
                    chip.addEventListener('click', function() {
                        // 传 cat.key 给 get_rankings（如 'xuanhuan'），失败回退到搜索 cat.name
                        searchByCategory(src.source, cat.key, cat.name);
                    });
                    section.appendChild(chip);
                });
            }
        });
    } catch (e) {
        section.innerHTML = '<span style="color:var(--text-muted);font-size:12px;">分类加载失败</span>';
    }
}

async function searchByCategory(source, categoryKey, categoryName) {
    showToast('查看分类: ' + categoryName, 'info');
    switchView('search');
    const grid = document.getElementById('searchResultsGrid');
    const searchEmpty = document.getElementById('searchEmpty');
    grid.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><span>加载分类...</span></div>';
    searchEmpty.style.display = 'none';
    try {
        // 从速读谷获取该分类的小说（带封面，按天缓存）
        let novels = null;
        try {
            const result = await window.pywebview.api.get_category_novels(categoryKey, 1);
            if (result && !result.error && Array.isArray(result) && result.length > 0) {
                novels = result;
            }
        } catch (e) { /* 回退到搜索 */ }

        // 回退：用搜索分类名
        if (!novels) {
            const result = await window.pywebview.api.search(categoryName, source);
            if (result && result.error) {
                showToast(result.error, 'error');
                grid.innerHTML = '';
                searchEmpty.style.display = '';
                return;
            }
            novels = result || [];
        }

        if (novels.length === 0) {
            grid.innerHTML = '';
            searchEmpty.style.display = '';
            searchEmpty.querySelector('p').textContent = '该分类暂无小说';
            return;
        }
        renderNovelGrid(grid, novels);
        // 速读谷数据已带封面，无需预获取
    } catch (e) {
        grid.innerHTML = '';
        searchEmpty.style.display = '';
        searchEmpty.querySelector('p').textContent = '加载失败: ' + (e.message || e);
    }
}

/* ====================================================================
   购物篮 Cart (Feature #8)
   ==================================================================== */
function addToCart(novel) {
    if (!novel || !novel.novel_id) return;
    const source = novel.source || state.sourceKey;
    if (state.cart.some(c => c.novel_id == novel.novel_id && c.source == source)) {
        showToast('已在购物篮中', 'info');
        return;
    }
    state.cart.push({
        novel_id: novel.novel_id,
        title: novel.title,
        author: novel.author,
        cover_url: novel.cover_url,
        source: source,
        source_key: novel.source_key || source,
    });
    updateCartBadge();
    showToast('已加入批量下载: ' + novel.title, 'success');
}

function removeFromCart(novelId, source) {
    state.cart = state.cart.filter(c => !(c.novel_id == novelId && c.source == source));
    updateCartBadge();
    renderCart();
}

function updateCartBadge() {
    const badge = document.getElementById('cartBadge');
    const count = state.cart.length;
    if (count > 0) {
        badge.textContent = count;
        badge.classList.remove('hidden');
    } else {
        badge.classList.add('hidden');
    }
}

function openCart() {
    renderCart();
    document.getElementById('cartModal').classList.add('active');
}

function closeCart() {
    document.getElementById('cartModal').classList.remove('active');
}

function closeCartOutside(e) {
    if (e.target === document.getElementById('cartModal')) {
        closeCart();
    }
}

function renderCart() {
    const list = document.getElementById('cartList');
    const empty = document.getElementById('cartEmpty');
    const countEl = document.getElementById('cartCount');
    const batchBtn = document.getElementById('batchDownloadBtn');
    list.innerHTML = '';
    countEl.textContent = '(' + state.cart.length + ')';
    if (state.cart.length === 0) {
        empty.style.display = '';
        batchBtn.disabled = true;
        return;
    }
    empty.style.display = 'none';
    batchBtn.disabled = false;
    state.cart.forEach((novel, idx) => {
        const item = document.createElement('div');
        item.className = 'list-item';
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'chapter-checkbox';
        checkbox.dataset.cartIndex = idx;
        checkbox.checked = true;
        item.appendChild(checkbox);
        const info = document.createElement('div');
        info.className = 'list-item-info';
        info.innerHTML = '<div class="list-item-title">' + escapeHtml(novel.title || '未知') + '</div>' +
            '<div class="list-item-meta">' + escapeHtml(novel.author || '佚名') + ' | ' + escapeHtml(novel.source || '') + '</div>';
        item.appendChild(info);
        const actions = document.createElement('div');
        actions.className = 'list-item-actions';
        const removeBtn = document.createElement('button');
        removeBtn.className = 'list-action-btn danger';
        removeBtn.textContent = '移除';
        removeBtn.onclick = function() { removeFromCart(novel.novel_id, novel.source); };
        actions.appendChild(removeBtn);
        item.appendChild(actions);
        list.appendChild(item);
    });
}

async function batchDownload() {
    const checkboxes = document.querySelectorAll('#cartList .chapter-checkbox');
    const selected = [];
    checkboxes.forEach(cb => {
        if (cb.checked) selected.push(state.cart[parseInt(cb.dataset.cartIndex)]);
    });
    if (selected.length === 0) {
        showToast('请至少选择一本小说', 'warning');
        return;
    }
    let saveDir;
    try {
        saveDir = await window.pywebview.api.select_save_dir();
        if (!saveDir) {
            showToast('已取消下载', 'warning');
            return;
        }
    } catch (e) {
        showToast('选择目录失败: ' + (e.message || e), 'error');
        return;
    }
    closeCart();
    showToast('开始批量下载 ' + selected.length + ' 本小说', 'info');
    addLog('批量下载开始: ' + selected.length + ' 本小说 -> ' + saveDir, 'info');
    if (!state.logExpanded) toggleLog();
    for (let i = 0; i < selected.length; i++) {
        const novel = selected[i];
        addLog('[' + (i + 1) + '/' + selected.length + '] 正在下载: ' + novel.title, 'info');
        try {
            const sourceKey = novel.source_key || novel.source;
            const chapters = await window.pywebview.api.get_chapters(novel.novel_id, sourceKey);
            if (chapters && chapters.length > 0) {
                const chapterIds = chapters.map(ch => ch.chapter_id);
                await window.pywebview.api.download(novel.novel_id, chapterIds, saveDir, sourceKey);
                addLog('完成: ' + novel.title, 'success');
            } else {
                addLog('无章节: ' + novel.title, 'warning');
            }
        } catch (e) {
            addLog('下载失败: ' + novel.title + ' - ' + (e.message || e), 'error');
        }
    }
    showToast('批量下载完成', 'success');
    state.historyLoaded = false;
}

/* ====================================================================
   历史记录 History (Feature #3)
   ==================================================================== */
async function loadHistory() {
    const list = document.getElementById('historyList');
    const empty = document.getElementById('historyEmpty');
    list.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><span>加载历史...</span></div>';
    empty.style.display = 'none';
    try {
        const result = await window.pywebview.api.get_history(100);
        state.historyLoaded = true;
        const items = result || [];
        if (items.length === 0) {
            list.innerHTML = '';
            empty.style.display = '';
            return;
        }
        renderHistory(items);
    } catch (e) {
        list.innerHTML = '';
        empty.style.display = '';
        empty.querySelector('p').textContent = '加载失败: ' + (e.message || e);
    }
}

function renderHistory(items) {
    const list = document.getElementById('historyList');
    const empty = document.getElementById('historyEmpty');
    list.innerHTML = '';
    empty.style.display = 'none';
    items.forEach(item => {
        const el = document.createElement('div');
        el.className = 'list-item';
        el.style.cursor = 'pointer';
        const info = document.createElement('div');
        info.className = 'list-item-info';
        const date = item.created_at ? formatHistoryDate(item.created_at) : '';
        info.innerHTML = '<div class="list-item-title">' + escapeHtml(item.title || '未知') + '</div>' +
            '<div class="list-item-meta">' + escapeHtml(item.source || '') +
            ' | ' + (item.chapter_success || 0) + '/' + (item.chapter_total || 0) + ' 章' +
            (date ? ' | ' + date : '') +
            (item.save_path ? ' | ' + escapeHtml(item.save_path) : '') + '</div>';
        el.appendChild(info);
        const statusEl = document.createElement('span');
        const status = (item.status || '').toLowerCase();
        const statusClass = status === 'completed' ? 'completed' : status === 'paused' ? 'paused' :
            status === 'failed' ? 'failed' : 'started';
        statusEl.className = 'list-status ' + statusClass;
        statusEl.textContent = item.status || '进行中';
        el.appendChild(statusEl);
        const actions = document.createElement('div');
        actions.className = 'list-item-actions';
        const openBtn = document.createElement('button');
        openBtn.className = 'list-action-btn';
        openBtn.textContent = '打开';
        openBtn.onclick = function(e) { e.stopPropagation(); reopenFromHistory(item); };
        const delBtn = document.createElement('button');
        delBtn.className = 'list-action-btn danger';
        delBtn.textContent = '删除';
        delBtn.onclick = function(e) { e.stopPropagation(); deleteHistoryItem(item.id); };
        actions.appendChild(openBtn);
        actions.appendChild(delBtn);
        el.appendChild(actions);
        el.addEventListener('click', function() { reopenFromHistory(item); });
        list.appendChild(el);
    });
}

function formatHistoryDate(dateStr) {
    if (!dateStr) return '';
    try {
        const d = new Date(dateStr);
        if (isNaN(d)) return dateStr;
        return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + d.toTimeString().slice(0, 5);
    } catch (e) { return dateStr; }
}

async function deleteHistoryItem(id) {
    try {
        await window.pywebview.api.delete_history(id);
        showToast('已删除', 'info');
        loadHistory();
    } catch (e) {
        showToast('删除失败: ' + (e.message || e), 'error');
    }
}

function reopenFromHistory(item) {

        source: item.source,
        source_key: item.source_key || item.source,

async function checkFavoriteStatus() {
    if (!state.novelId) return;
    const source = state.currentNovel ? (state.currentNovel.source || state.sourceKey) : state.sourceKey;
    try {
        const result = await window.pywebview.api.is_favorited(state.novelId, source);
        state.isFavorited = !!(result && result.favorited);
        updateFavoriteBtn();
    } catch (e) { /* 忽略 */ }

async function toggleFavorite() {
    if (!state.novelId) {
        showToast('请先选择小说', 'warning');
        return;
    }
    const source = state.currentNovel ? (state.currentNovel.source || state.sourceKey) : state.sourceKey;
    try {
        if (state.isFavorited) {
            await window.pywebview.api.remove_favorite(state.novelId, source);
            state.isFavorited = false;
            showToast('已取消收藏', 'info');
            addLog('取消收藏: ' + state.novelTitle, 'info');
        } else {
            const novelData = Object.assign({}, state.currentNovel || {}, {
                novel_id: state.novelId,
                title: state.novelTitle,
                source: source,
                source_key: state.sourceKey,
            });
            await window.pywebview.api.add_favorite(JSON.stringify(novelData));
            state.isFavorited = true;
            showToast('已加入收藏', 'success');
            addLog('加入收藏: ' + state.novelTitle, 'success');
        }
        updateFavoriteBtn();
        state.favoritesLoaded = false;
    } catch (e) {
        showToast('收藏操作失败: ' + (e.message || e), 'error');
    }
}

function updateFavoriteBtn() {
    const btn = document.getElementById('favoriteBtn');
    if (!btn) return;
    const heartSvg = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 14s-5-3.5-5-7a3 3 0 015-2.2A3 3 0 0113 7c0 3.5-5 7-5 7z"/></svg>';
    if (state.isFavorited) {
        btn.classList.add('active');
        btn.innerHTML = heartSvg + ' 已收藏';
    } else {
        btn.classList.remove('active');
        btn.innerHTML = heartSvg + ' 收藏';

function renderPausedTasks(items) {

/* ====================================================================
   更新小说 Update Novel (Feature #2)
   ==================================================================== */
async function updateNovel() {
    if (!state.novelId) {
        showToast('请先选择小说', 'warning');
        return;
    }
    showToast('正在检查更新...', 'info');
    try {
        const sourceKey = getSelectedSourceKey();
        const result = await window.pywebview.api.update_novel(state.novelId, sourceKey);
        if (result && result.error) {
            showToast('更新检查失败: ' + result.error, 'error');
            addLog('更新检查失败: ' + result.error, 'error');
            return;
        }
        const newCount = result.new_count || (result.new_chapters ? result.new_chapters.length : 0);
        if (newCount > 0) {
            showToast('发现 ' + newCount + ' 个新章节', 'success');
            addLog('发现 ' + newCount + ' 个新章节，已刷新章节列表', 'success');
            await loadChapters();
        } else {
            showToast('已是最新，无新章节', 'info');
            addLog('已是最新章节', 'info');
        }
    } catch (e) {
        showToast('更新失败: ' + (e.message || e), 'error');
        addLog('更新异常: ' + (e.message || e), 'error');
    }
}

/* ====================================================================
   章节范围选择 Chapter Range (Feature #7)
   ==================================================================== */
function applyChapterRange() {
    if (state.chapters.length === 0) {
        showToast('请先加载章节', 'warning');
        return;
    }
    const startInput = document.getElementById('rangeStart');
    const endInput = document.getElementById('rangeEnd');
    let start = parseInt(startInput.value);
    let end = parseInt(endInput.value);
    if (isNaN(start)) start = 1;
    if (isNaN(end)) end = state.chapters.length;
    start = Math.max(1, Math.min(state.chapters.length, start));
    end = Math.max(1, Math.min(state.chapters.length, end));
    if (start > end) { const t = start; start = end; end = t; }
    state.selectedChapters.clear();
    for (let i = start - 1; i <= end - 1 && i < state.chapters.length; i++) {
        state.selectedChapters.add(state.chapters[i].chapter_id);
    }
    syncChapterCheckboxes();
    updateChapterCount();
    showToast('已选择第 ' + start + '-' + end + ' 章', 'info');
}

function selectFirst100() {
    if (state.chapters.length === 0) { showToast('请先加载章节', 'warning'); return; }
    const count = Math.min(100, state.chapters.length);
    state.selectedChapters.clear();
    for (let i = 0; i < count; i++) state.selectedChapters.add(state.chapters[i].chapter_id);
    syncChapterCheckboxes();
    updateChapterCount();
    showToast('已选择前 ' + count + ' 章', 'info');
}

function selectLast100() {
    if (state.chapters.length === 0) { showToast('请先加载章节', 'warning'); return; }
    const count = Math.min(100, state.chapters.length);
    const startIdx = state.chapters.length - count;
    state.selectedChapters.clear();
    for (let i = startIdx; i < state.chapters.length; i++) state.selectedChapters.add(state.chapters[i].chapter_id);
    syncChapterCheckboxes();
    updateChapterCount();
    showToast('已选择后 ' + count + ' 章', 'info');
}

function selectLatest50() {
    if (state.chapters.length === 0) { showToast('请先加载章节', 'warning'); return; }
    const count = Math.min(50, state.chapters.length);
    const startIdx = state.chapters.length - count;
    state.selectedChapters.clear();
    for (let i = startIdx; i < state.chapters.length; i++) state.selectedChapters.add(state.chapters[i].chapter_id);
    syncChapterCheckboxes();
    updateChapterCount();
    showToast('已选择最新 ' + count + ' 章', 'info');
}

function syncChapterCheckboxes() {
    document.querySelectorAll('.chapter-checkbox').forEach(cb => {
        const id = cb.dataset.chapterId;
        if (state.selectedChapters.has(id)) {
            cb.checked = true;
            cb.closest('.chapter-item').classList.add('selected');
        } else {
            cb.checked = false;
            cb.closest('.chapter-item').classList.remove('selected');
        }
    });
}

/* ====================================================================
   阅读器 Reader (Feature #4)
   ==================================================================== */
async function openReader() {
    if (!state.novelId || state.chapters.length === 0) {
        showToast('请先加载小说章节', 'warning');
        return;
    }
    document.getElementById('readerNovelTitle').textContent = state.novelTitle;
    document.getElementById('readerOverlay').classList.add('active');
    renderReaderSidebar();
    applyReaderFontSize();
    // 从上次阅读位置恢复
    let startIndex = 0;
    let startChapterId = state.chapters[0].chapter_id;
    try {
        const progress = await window.pywebview.api.get_reading_progress(state.novelId);
        if (progress && progress.last_chapter_id) {
            const idx = state.chapters.findIndex(ch => ch.chapter_id == progress.last_chapter_id);
            if (idx >= 0) {
                startIndex = idx;
                startChapterId = state.chapters[idx].chapter_id;
            }
        }
    } catch (e) { /* 忽略 */ }
    await readChapterById(startChapterId);
}

function closeReader() {
    document.getElementById('readerOverlay').classList.remove('active');
}

function renderReaderSidebar() {
    const sidebar = document.getElementById('readerSidebar');
    sidebar.innerHTML = '';
    const fragment = document.createDocumentFragment();
    state.chapters.forEach((ch, idx) => {
        const item = document.createElement('div');
        item.className = 'reader-chapter-item';
        item.textContent = ch.chapter_title;
        item.title = ch.chapter_title;
        item.dataset.index = idx;
        item.addEventListener('click', function() {
            readChapterById(ch.chapter_id);
        });
        fragment.appendChild(item);
    });
    sidebar.appendChild(fragment);
}

async function readChapterById(chapterId) {
    if (!state.novelId) return;
    const sourceKey = getSelectedSourceKey();
    const contentArea = document.getElementById('readerContent');
    contentArea.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><span>加载中...</span></div>';
    try {
        const result = await window.pywebview.api.read_chapter(state.novelId, chapterId, sourceKey);
        if (result && result.error) {
            contentArea.innerHTML = '<p style="color:var(--error);text-align:center;">' + escapeHtml(result.error) + '</p>';
            return;
        }
        const idx = state.chapters.findIndex(ch => ch.chapter_id == chapterId);
        state.reading.currentChapterIndex = idx >= 0 ? idx : 0;
        const title = result.title || (state.chapters[idx] ? state.chapters[idx].chapter_title : '');
        const content = result.content || '';
        contentArea.innerHTML = '<h2>' + escapeHtml(title) + '</h2>' + renderChapterContent(content);
        contentArea.scrollTop = 0;
        updateReaderSidebarActive();
        updateReaderNavButtons();
        document.getElementById('readerChapterInfo').textContent = '第 ' + (state.reading.currentChapterIndex + 1) + '/' + state.chapters.length + ' 章';
        saveReadingProgress(chapterId, title, state.reading.currentChapterIndex);
    } catch (e) {
        contentArea.innerHTML = '<p style="color:var(--error);text-align:center;">加载失败: ' + escapeHtml(e.message || e) + '</p>';
    }
}

function renderChapterContent(content) {
    if (!content) return '<p>（无内容）</p>';
    return content.split(/\n+/).filter(p => p.trim()).map(p => '<p>' + escapeHtml(p) + '</p>').join('');
}

function updateReaderSidebarActive() {
    const items = document.querySelectorAll('.reader-chapter-item');
    items.forEach((item, idx) => {
        if (idx === state.reading.currentChapterIndex) {
            item.classList.add('active');
            item.scrollIntoView({ block: 'nearest' });
        } else {
            item.classList.remove('active');
        }
    });
}

function updateReaderNavButtons() {
    document.getElementById('readerPrevBtn').disabled = state.reading.currentChapterIndex <= 0;
    document.getElementById('readerNextBtn').disabled = state.reading.currentChapterIndex >= state.chapters.length - 1;
}

function nextChapter() {
    const idx = state.reading.currentChapterIndex + 1;
    if (idx < state.chapters.length) readChapterById(state.chapters[idx].chapter_id);
}

function prevChapter() {
    const idx = state.reading.currentChapterIndex - 1;
    if (idx >= 0) readChapterById(state.chapters[idx].chapter_id);
}

function changeFontSize(delta) {
    state.reading.fontSize = Math.max(12, Math.min(28, state.reading.fontSize + delta));
    applyReaderFontSize();
}

function applyReaderFontSize() {
    document.getElementById('readerContent').style.fontSize = state.reading.fontSize + 'px';
    document.getElementById('readerFontSize').textContent = state.reading.fontSize;
}

async function saveReadingProgress(chapterId, chapterTitle, chapterIndex) {
    if (!state.novelId) return;
    try {
        await window.pywebview.api.save_reading_progress(
            state.novelId, state.novelTitle, chapterId, chapterTitle, chapterIndex, 0
        );
    } catch (e) { /* 忽略 */ }
}

/* ====================================================================
   Init
   ==================================================================== */
// 等待 pywebview API 注入就绪后再加载数据
// pywebview 会注入 window.pywebview.api 并触发 'pywebviewready' 事件
function initApp() {
    addLog('FXdownloader 已启动', 'info');
    // 启动时加载发现页榜单
    loadRankings();
    loadCategories();
}

if (window.pywebview && window.pywebview.api) {
    // API 已就绪（防止事件已错过）
    initApp();
} else {
    // 监听 pywebviewready 事件（API 注入完成时触发）
    window.addEventListener('pywebviewready', initApp);
}
</script>
