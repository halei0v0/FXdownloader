                <select id="settingConcurrent" class="form-select">
                    <option value="1">1 (最慢，最安全)</option>
                    <option value="2">2</option>
                    <option value="3" selected>3 (默认)</option>
                    <option value="4">4</option>
                    <option value="5">5 (最快)</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">导出时去除空行</label>
                <div class="toggle-row">
                    <label class="toggle-switch">
                        <input type="checkbox" id="settingRemoveEmptyLines">
                        <span class="toggle-slider"></span>
                    </label>
                    <span class="toggle-label">开启后导出文件中不会出现空行</span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">封面信息缓存</label>
                <div class="toggle-row" style="justify-content:space-between;">
                    <span class="toggle-label" id="coverCacheInfo">加载中...</span>
                    <button class="btn-modal btn-modal-cancel" style="padding:4px 12px;font-size:12px;" onclick="clearCoverCache()">清除缓存</button>
                </div>
                <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">小说封面 URL 等信息缓存，清除后下次显示封面时会重新获取</div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-modal btn-modal-cancel" onclick="closeSettings()">取消</button>
            <button class="btn-modal btn-modal-save" onclick="saveSettings()">保存</button>
        </div>
    </div>
</div>

<!-- 购物篮模态框 Cart Modal -->
<div id="cartModal" class="modal-overlay" onclick="closeCartOutside(event)">
    <div class="modal wide">
        <h3 class="modal-title">购物篮 <span id="cartCount" style="color:var(--text-muted);font-size:13px;font-weight:400;">(0)</span></h3>
        <div class="modal-body">
            <div id="cartList"></div>
            <div id="cartEmpty" class="view-empty" style="min-height:160px;">
                <p>购物篮为空，从搜索或榜单中添加小说吧</p>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-modal btn-modal-cancel" onclick="closeCart()">关闭</button>
            <button id="batchDownloadBtn" class="btn-modal btn-modal-save" onclick="batchDownload()">批量下载</button>
        </div>
    </div>
</div>

<!-- 阅读器 Reader -->
<div id="readerOverlay" class="reader-overlay">
    <div class="reader-header">
        <div class="reader-title" id="readerNovelTitle">阅读</div>
        <div class="reader-controls">
            <button class="reader-theme-btn" id="readerThemeBtn" onclick="toggleReaderTheme()" title="切换护眼/深色背景">
                <svg viewBox="0 0 14 14" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                    <circle cx="7" cy="7" r="3"/>
                    <path d="M7 1v2M7 11v2M1 7h2M11 7h2M3 3l1.5 1.5M9.5 9.5L11 11M11 3L9.5 4.5M4.5 9.5L3 11"/>
                </svg>
                <span id="readerThemeLabel">护眼</span>
            </button>
            <div class="reader-font-controls">
                <span>字号</span>
                <button class="reader-font-btn" onclick="changeFontSize(-1)" title="减小字号">-</button>
                <span id="readerFontSize">18</span>
                <button class="reader-font-btn" onclick="changeFontSize(1)" title="增大字号">+</button>
            </div>
            <button class="reader-tts-btn" id="readerTtsBtn" onclick="toggleTTS()" title="语音朗读当前章节">
                <svg viewBox="0 0 14 14" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 5h2L7 2.5v9L4 9H2V5z"/>
                    <path d="M9.5 4.5a3 3 0 010 5"/>
                    <path d="M11 3a5 5 0 010 8"/>
                </svg>
                <span id="readerTtsLabel">朗读</span>
            </button>
            <button class="reader-nav-btn" onclick="closeReader()" title="退出阅读">
                <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                    <line x1="3" y1="3" x2="11" y2="11"/>
                    <line x1="11" y1="3" x2="3" y2="11"/>
                </svg>
                关闭
            </button>
        </div>
    </div>
    <div class="reader-body">
        <div class="reader-sidebar" id="readerSidebar"></div>
        <div class="reader-main">
            <div id="readerContent" class="reader-content-area"></div>
            <div class="reader-footer">
                <button id="readerPrevBtn" class="reader-nav-btn" onclick="prevChapter()" disabled>
                    <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 2L3 6l5 4"/>
                    </svg>
                    上一章
                </button>
                <span id="readerChapterInfo" style="font-size:12px;color:var(--text-muted);">-</span>
                <button id="readerNextBtn" class="reader-nav-btn" onclick="nextChapter()">
                    下一章
                    <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 2l5 4-5 4"/>
                    </svg>
                </button>

    <!-- TTS 朗读控制条 -->
    <div id="ttsControlBar" class="tts-control-bar">
        <button class="tts-btn" id="ttsPrevBtn" onclick="ttsJump(-1)" title="上一句" disabled>
            <svg viewBox="0 0 14 14" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 3L4 7l5 4V3z"/>
                <line x1="2.5" y1="3" x2="2.5" y2="11"/>
            </svg>
        </button>
        <button class="tts-btn primary" id="ttsPlayBtn" onclick="toggleTTS()" title="播放/暂停">
            <svg id="ttsPlayIcon" viewBox="0 0 14 14" width="16" height="16" fill="currentColor"><path d="M3 2v10l8-5z"/></svg>
        </button>
        <button class="tts-btn" id="ttsNextBtn" onclick="ttsJump(1)" title="下一句" disabled>
            <svg viewBox="0 0 14 14" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 3l5 4-5 4V3z"/>
                <line x1="11.5" y1="3" x2="11.5" y2="11"/>
            </svg>
        </button>
        <button class="tts-btn" id="ttsStopBtn" onclick="stopTTS()" title="停止朗读">
            <svg viewBox="0 0 14 14" width="14" height="14" fill="currentColor"><rect x="3.5" y="3.5" width="7" height="7" rx="1"/></svg>
        </button>
        <div class="tts-divider"></div>
        <div class="tts-rate-group">
            <span class="tts-rate-label">语速</span>
            <input type="range" id="ttsRateSlider" min="0.5" max="2" step="0.1" value="1" oninput="onTTSRateChange()">
            <span class="tts-rate-label" id="ttsRateLabel">1.0x</span>
        </div>
        <div class="tts-divider"></div>

            <select id="ttsVoiceSelect" onchange="onTTSVoiceChange()" title="选择音色"></select>

        </label>
        <label class="tts-toggle" title="读完本章后自动朗读下一章">
            <input type="checkbox" id="ttsAutoNextChk" checked> 自动续读
        </label>
        <span class="tts-status" id="ttsStatus">就绪</span>
    </div>
</div>

<!-- Toast Container -->
<div id="toastContainer" class="toast-container"></div>

<script>
/* ====================================================================
   State
   ==================================================================== */
const state = {
    sourceKey: 'biquge',       // current source
    novelId: null,             // current novel id
    novelTitle: '',            // current novel title
    chapters: [],              // [{chapter_id, chapter_title, chapter_index}]
    selectedChapters: new Set(),
    downloading: false,
    logExpanded: false,
    currentView: 'discover',   // 当前视图
    currentNovel: null,        // 当前小说对象（含 source 等信息）
    cart: [],                  // 购物篮 [{novel_id, title, author, cover_url, source, source_key}]
    paused: false,             // 下载是否暂停
    isFavorited: false,        // 当前小说是否已收藏
    reading: {                 // 阅读状态
        currentChapterIndex: 0,
        fontSize: 18,
        theme: 'eye-care',     // 'eye-care' 护眼（默认开）| 'dark' 深色
        loadedChapters: new Set(), // 已加载到内容区的章节索引（连续滚动）
        isLoadingMore: false,  // 是否正在加载下一章（防重入）
        endReachedShown: false, // 是否已显示"已读完"提示
    },
    tts: {                      // 语音朗读状态
        active: false,          // 是否正在朗读流程中（控制条可见）
        playing: false,         // 是否正在播放（非暂停）
        sentences: [],          // 当前章节切分后的句子列表 [{text, span}]
        currentIdx: 0,          // 当前朗读的句子索引
        chapterIdx: -1,         // 当前朗读的章节索引
        voice: 'zh-CN-XiaoxiaoNeural',
        rate: 1.0,              // 语速倍数（1.0=正常）
        audio: null,            // 当前 Audio 元素
        loadingVoice: false,    // 是否正在请求后端生成音频
        genToken: 0,             // 生成令牌（跳转/停止时自增，用于丢弃过期请求）
        roleMode: false,         // 角色识别模式开关
        charVoices: {},          // {角色名: voiceId}
        charGenders: {},         // {角色名: 'male'|'female'}
        malePoolIdx: 0,          // 男声池分配游标
        femalePoolIdx: 0,        // 女声池分配游标
        narrationVoice: 'zh-CN-YunxiNeural', // 旁白音色：云希
    },
    rankingsLoaded: false,     // 榜单是否已加载
    favoritesLoaded: false,    // 收藏是否已加载
    historyLoaded: false,      // 历史是否已加载
    pausedLoaded: false,       // 续传任务是否已加载
    batchDownloading: false,    // 批量下载进行中
    batchCancel: false,         // 批量下载取消标志
    supplementMode: false,     // 补全模式：更新小说后选中缺失章节，下载时追加到已有文件
};

/* ====================================================================
   Helpers
   ==================================================================== */

/* Toast notification */
function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const icons = {
        success: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6"/><path d="M5.5 8l2 2 3-3.5"/></svg>',
        error: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><line x1="5.5" y1="5.5" x2="10.5" y2="10.5"/><line x1="10.5" y1="5.5" x2="5.5" y2="10.5"/></svg>',
        warning: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2L1 14h14L8 2z"/><line x1="8" y1="6" x2="8" y2="10"/><circle cx="8" cy="12" r="0.5"/></svg>',
        info: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><line x1="8" y1="7" x2="8" y2="12"/><circle cx="8" cy="4.5" r="0.5"/></svg>',
    };
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = (icons[type] || icons.info) + `<span>${escapeHtml(message)}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.classList.add('removing');
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

/* Add a log entry */
function addLog(text, type = 'info') {
    const logContent = document.getElementById('logContent');
    const entry = document.createElement('div');
    entry.className = `log-entry ${type}`;
    const now = new Date();
    const time = now.toTimeString().slice(0, 8);
    entry.textContent = `[${time}] ${text}`;
    logContent.appendChild(entry);
    logContent.scrollTop = logContent.scrollHeight;
}

/* Escape HTML */
function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

/* Get source key from select */
function getSelectedSourceKey() {
    return document.getElementById('sourceSelect').value;
}

/* Map source key to internal source name for Python backend */
function mapSourceKey(key) {
    const map = {
        'biquge': 'biquge',
        'fanqie_api': 'fanqie_api',
        'fanqie_official': 'fanqie_official',
    };
    return map[key] || key;
}

/* ====================================================================
   Source Selector
   ==================================================================== */
document.getElementById('sourceSelect').addEventListener('change', function() {
    state.sourceKey = this.value;
    const loginBtn = document.getElementById('loginBtn');
    if (this.value === 'fanqie_official') {
        loginBtn.classList.remove('hidden');
    } else {
        loginBtn.classList.add('hidden');
    }
    // Reset state on source change
    resetState();
});

function resetState() {
    state.novelId = null;
    state.novelTitle = '';
    state.chapters = [];
    state.selectedChapters.clear();
    state.currentNovel = null;
    state.isFavorited = false;
    document.getElementById('novelCard').classList.remove('active');
    document.getElementById('emptyState').style.display = '';
    document.getElementById('chapterList').innerHTML = '';
    renderChapterEmpty();
    document.getElementById('chapterCountInfo').style.display = 'none';
    document.getElementById('downloadBtn').disabled = true;
    document.getElementById('progressSection').classList.remove('active');
    document.getElementById('logContent').innerHTML = '';
}

/* ====================================================================
   Search
   ==================================================================== */
const searchInput = document.getElementById('searchInput');

searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        handleSearch();
    }
});

async function handleSearch() {
    const keyword = searchInput.value.trim();
    if (!keyword) {
        showToast('请输入搜索关键词或URL', 'warning');
        return;
    }

    const btn = document.getElementById('searchBtn');
    const loading = document.getElementById('loadingState');
    const grid = document.getElementById('searchResultsGrid');
    const searchEmpty = document.getElementById('searchEmpty');

    btn.disabled = true;
    btn.textContent = '搜索中...';
    loading.style.display = 'flex';
    grid.innerHTML = '';
    searchEmpty.style.display = 'none';

    try {
        const sourceKey = getSelectedSourceKey();
        const result = await window.pywebview.api.search(keyword, sourceKey);

        loading.style.display = 'none';
        btn.disabled = false;
        btn.innerHTML = '<svg viewBox="0 0 14 14" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="6" cy="6" r="4.5"/><line x1="9.5" y1="9.5" x2="13" y2="13"/></svg> 搜索';

        if (result && result.error) {
            showToast(result.error, 'error');
            addLog('搜索失败: ' + result.error, 'error');
            return;
        }

        const novels = result || [];
        switchView('search');

        if (novels.length === 0) {
            showToast('未找到相关小说', 'warning');
            searchEmpty.style.display = '';
            searchEmpty.querySelector('p').textContent = '未找到 "' + keyword + '" 相关小说';
            return;
        }

        renderNovelGrid(grid, novels);
        // 自动补全缺失封面（从本地缓存或源获取）
        prefetchAndApplyCovers(novels, grid);
        addLog('搜索 "' + keyword + '" 返回 ' + novels.length + ' 条结果', 'info');

    } catch (e) {
        loading.style.display = 'none';
        btn.disabled = false;
        btn.innerHTML = '<svg viewBox="0 0 14 14" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="6" cy="6" r="4.5"/><line x1="9.5" y1="9.5" x2="13" y2="13"/></svg> 搜索';
        showToast('搜索出错: ' + (e.message || e), 'error');
        addLog('搜索异常: ' + (e.message || e), 'error');
    }
}

/* 渲染小说卡片到网格容器 */
function renderNovelGrid(container, novels, withRank, options) {
    container.innerHTML = '';
    const fragment = document.createDocumentFragment();
    novels.forEach((novel, idx) => {
        fragment.appendChild(buildNovelCard(novel, withRank ? idx + 1 : 0, options));
    });
    container.appendChild(fragment);
}

/* 格式化小说状态：统一映射为"完本"或"连载"，未知返回空字符串 */
function formatNovelStatus(rawStatus) {
    if (!rawStatus) return '';
    const s = String(rawStatus).trim();
    if (!s) return '';
    const lower = s.toLowerCase();
    // "未"前缀表示否定，需先检查：未完结/未完本 -> 连载
    const negatedOngoing = ['未完结', '未完本'];
    if (negatedOngoing.some(k => s.includes(k) || lower.includes(k.toLowerCase()))) {
        return '连载';
    }
    // 完本/完结/已完结/全本 -> 完本
    const finishKeywords = ['完本', '完结', '已完结', '全本', '完成', '已完本'];
    // 连载/连载中/更新中 -> 连载
    const ongoingKeywords = ['连载', '连载中', '更新中'];
    if (finishKeywords.some(k => s.includes(k) || lower.includes(k.toLowerCase()))) {
        return '完本';
    }
    if (ongoingKeywords.some(k => s.includes(k) || lower.includes(k.toLowerCase()))) {
        return '连载';
    }
    return '';
}

/* 构建单张小说卡片（用于发现/搜索/收藏视图） */
function buildNovelCard(novel, rankNum, options) {
    options = options || {};
    const wrapper = document.createElement('div');
    wrapper.className = 'novel-grid-card-wrapper';

    const card = document.createElement('div');
    card.className = 'novel-grid-card';
    // 添加 data-novel-id 便于后续更新封面
    if (novel.novel_id) {
        card.setAttribute('data-novel-id', novel.novel_id);
    }

    // 封面
    if (novel.cover_url) {
        const img = document.createElement('img');
        img.className = 'grid-card-cover';
        img.src = novel.cover_url;
        img.onerror = function() {
            const ph = document.createElement('div');
            ph.className = 'grid-card-cover-placeholder';
            ph.innerHTML = '<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="5" y="2" width="22" height="28" rx="2"/><line x1="9" y1="9" x2="23" y2="9"/><line x1="9" y1="14" x2="21" y2="14"/><line x1="9" y1="19" x2="19" y2="19"/></svg>';
            img.replaceWith(ph);
        };
        card.appendChild(img);
    } else {
        const ph = document.createElement('div');
        ph.className = 'grid-card-cover-placeholder';
        ph.innerHTML = '<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="5" y="2" width="22" height="28" rx="2"/><line x1="9" y1="9" x2="23" y2="9"/><line x1="9" y1="14" x2="21" y2="14"/><line x1="9" y1="19" x2="19" y2="19"/></svg>';
        card.appendChild(ph);
    }

    // 标题
    const title = document.createElement('div');
    title.className = 'grid-card-title';
    title.textContent = novel.title || '未知书名';
    card.appendChild(title);

    // 元信息
    const meta = document.createElement('div');
    meta.className = 'grid-card-meta';
    const metaParts = [];
    if (novel.author) metaParts.push(novel.author);
    if (novel.source_name || novel.source) metaParts.push(novel.source_name || novel.source);
    meta.textContent = metaParts.join(' | ') || '佚名';
    card.appendChild(meta);

    // 状态标签（完本/连载）
    // options.hideStatus=true 时不显示（用于排行榜/分类，因 sudugu 缓存状态可能与实际源不一致）
    const showStatus = !(options && options.hideStatus);
    const statusText = showStatus ? formatNovelStatus(novel.status || (novel.extra && novel.extra.status) || '') : '';
    if (statusText) {
        const statusTag = document.createElement('div');
        statusTag.className = 'grid-card-status ' + (statusText === '完本' ? 'status-finish' : 'status-ongoing');
        statusTag.textContent = statusText;
        card.appendChild(statusTag);
    }

    // 操作按钮
    const actions = document.createElement('div');
    actions.className = 'grid-card-actions';
    const detailBtn = document.createElement('button');
    detailBtn.className = 'grid-card-btn primary';
    detailBtn.textContent = '查看详情';
    detailBtn.onclick = function(e) { e.stopPropagation(); selectNovel(novel); };
    actions.appendChild(detailBtn);
    // 收藏卡片显示"阅读"按钮
    if (options.showReadBtn) {
        const readBtn = document.createElement('button');
        readBtn.className = 'grid-card-btn';
        readBtn.textContent = '阅读';
        readBtn.onclick = function(e) {
            e.stopPropagation();
            readNovelDirectly(novel);
        };
        actions.appendChild(readBtn);
    }
    const cartBtn = document.createElement('button');
    cartBtn.className = 'grid-card-btn';
    cartBtn.textContent = '加入批量下载';
    cartBtn.onclick = function(e) { e.stopPropagation(); addToCart(novel); };
    actions.appendChild(cartBtn);
    card.appendChild(actions);

    card.addEventListener('click', function() { selectNovel(novel); });

    wrapper.appendChild(card);

    // 排名徽标
    if (rankNum) {
        const rank = document.createElement('div');
        rank.className = 'grid-card-rank';
        rank.textContent = rankNum;
        wrapper.appendChild(rank);
    }

    return wrapper;
}

/* 从收藏直接进入阅读：解析小说 → 加载章节 → 打开阅读器 */
async function readNovelDirectly(novel) {
    if (!novel || (!novel.novel_id && !novel.title)) {
        showToast('小说信息无效', 'warning');
        return;
    }
    showToast('正在加载小说...', 'info');
    // 先走 selectNovel 流程（自动切源、解析、加载章节）
    await selectNovel(novel);
    // 章节加载成功后打开阅读器
    if (state.novelId && state.chapters && state.chapters.length > 0) {
        openReader();
    }
}

function formatWordCount(count) {
    if (count >= 10000) {
        return (count / 10000).toFixed(1) + '万字';
    }
    return count + '字';
}

/* ====================================================================
   Select Novel (Parse)
   ==================================================================== */
async function selectNovel(novel) {
    // 切换到详情视图
    switchView('detail');
    document.getElementById('emptyState').style.display = 'none';
    state.currentNovel = novel;

    // 根据搜索结果来源自动切换源
    const src = novel.source;
    const sourceSelect = document.getElementById('sourceSelect');
    if (src && src !== 'fanqie') {
        // 非番茄源：直接用对应源
        sourceSelect.value = src;
        state.sourceKey = src;
        document.getElementById('loginBtn').classList.add('hidden');
    } else if (src === 'fanqie') {
        // 番茄搜索结果使用 API 模式（免登录）
        sourceSelect.value = 'fanqie_api';
        state.sourceKey = 'fanqie_api';
        document.getElementById('loginBtn').classList.add('hidden');
    }

    const novelCard = document.getElementById('novelCard');
    // Show loading in card area
    novelCard.classList.add('active');
    document.getElementById('novelTitle').textContent = '加载中...';
    document.getElementById('novelAuthor').textContent = '';
    document.getElementById('novelDesc').textContent = '';
    document.getElementById('novelTags').innerHTML = '';

    try {
        // 排行榜来源（sudugu）：用书名在所有源搜索
        if (novel.source === 'sudugu' || novel.source_key === 'sudugu') {
            const searchKeyword = novel.title;
            addLog('从排行榜选择: ' + searchKeyword + '，正在搜索各源...', 'info');
            const searchResults = await window.pywebview.api.search(searchKeyword, 'biquge');

            if (searchResults && searchResults.error) {
                showToast(searchResults.error, 'error');
                novelCard.classList.remove('active');
                document.getElementById('emptyState').style.display = '';
                return;
            }

            const novels = searchResults || [];
            if (novels.length === 0) {
                showToast('未找到该书: ' + searchKeyword, 'warning');
                novelCard.classList.remove('active');
                document.getElementById('emptyState').style.display = '';
                return;
            }

            // 如果只有一个结果，直接选中
            if (novels.length === 1) {
                const target = novels[0];
                // 递归调用 selectNovel，用真实源的数据
                return selectNovel(target);
            }

            // 多个结果：切换到搜索视图让用户选择
            showToast('找到 ' + novels.length + ' 个结果，请选择', 'info');
            switchView('search');
            const grid = document.getElementById('searchResultsGrid');
            const searchEmpty = document.getElementById('searchEmpty');
            searchEmpty.style.display = 'none';
            renderNovelGrid(grid, novels);
            // 预获取搜索结果封面
            prefetchAndApplyCovers(novels, grid);
            return;
        }

        const sourceKey = state.sourceKey;
        const result = await window.pywebview.api.parse_novel(novel.novel_id, sourceKey);

        if (result && result.error) {
            showToast(result.error, 'error');
            addLog('解析失败: ' + result.error, 'error');
            novelCard.classList.remove('active');
            document.getElementById('emptyState').style.display = '';
            return;
        }

        state.novelId = result.novel_id || novel.novel_id;
        state.novelTitle = result.title || novel.title;
        displayNovelInfo(result);
        addLog('已选择小说: ' + state.novelTitle, 'success');

        // 检查收藏状态
        checkFavoriteStatus();

        // Fetch chapters
        await loadChapters();

    } catch (e) {
        showToast('解析小说失败: ' + (e.message || e), 'error');
        addLog('解析异常: ' + (e.message || e), 'error');
        novelCard.classList.remove('active');
        document.getElementById('emptyState').style.display = '';
    }
}

function displayNovelInfo(info) {
    document.getElementById('novelTitle').textContent = info.title || '';
    document.getElementById('novelAuthor').textContent = (info.author ? '作者: ' + info.author : '');

    // Tags
    const tagsEl = document.getElementById('novelTags');
    tagsEl.innerHTML = '';
    const rawStatus = info.status || (info.extra && info.extra.status) || '';
    const statusText = formatNovelStatus(rawStatus);
    if (statusText) {
        tagsEl.innerHTML += `<span class="novel-tag status ${statusText === '完本' ? 'tag-finish' : 'tag-ongoing'}">${escapeHtml(statusText)}</span>`;
    }
    if (info.chapter_count) {
        tagsEl.innerHTML += `<span class="novel-tag count">${info.chapter_count} 章节</span>`;
    }
    if (info.word_count) {
        tagsEl.innerHTML += `<span class="novel-tag count">${formatWordCount(info.word_count)}</span>`;
    }

    // Description
    document.getElementById('novelDesc').textContent = info.description || '';

    // Cover
    const coverEl = document.getElementById('novelCover');
    if (info.cover_url) {
        coverEl.innerHTML = '';
        coverEl.className = 'novel-cover';
        const img = document.createElement('img');
        img.src = info.cover_url;
        img.className = 'novel-cover';
        img.onerror = function() {
            coverEl.className = 'novel-cover-placeholder';

/* ====================================================================
   Chapter List
   ==================================================================== */
async function loadChapters() {
    if (!state.novelId) return;

    const chapterList = document.getElementById('chapterList');
    chapterList.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><span>加载章节列表...</span></div>';

    try {
        const sourceKey = getSelectedSourceKey();
        const result = await window.pywebview.api.get_chapters(state.novelId, sourceKey);

        if (result && result.error) {
            showToast('获取章节列表失败: ' + result.error, 'error');
            addLog('章节列表错误: ' + result.error, 'error');
            renderChapterEmpty();
            return;
        }

        state.chapters = result || [];
        state.selectedChapters.clear();

        if (state.chapters.length === 0) {
            showToast('章节列表为空', 'warning');
            renderChapterEmpty();
            return;
        }

        renderChapterList();
        // 默认全选所有章节
        selectAllChapters();
        document.getElementById('downloadBtn').disabled = false;
        addLog('共加载 ' + state.chapters.length + ' 个章节（默认全选）', 'info');

    } catch (e) {
        showToast('加载章节出错: ' + (e.message || e), 'error');
        addLog('章节列表异常: ' + (e.message || e), 'error');
        renderChapterEmpty();
    }
}

function renderChapterEmpty() {
    const chapterList = document.getElementById('chapterList');
    chapterList.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.2">
            <rect x="6" y="4" width="36" height="40" rx="3"/>
            <line x1="14" y1="14" x2="34" y2="14"/>
            <line x1="14" y1="22" x2="30" y2="22"/>
            <line x1="14" y1="30" x2="32" y2="30"/>
        </svg>
        <p>选择小说后查看章节列表</p>
    </div>`;
    document.getElementById('chapterCountInfo').style.display = 'none';
}

function renderChapterList() {
    const chapterList = document.getElementById('chapterList');
    chapterList.innerHTML = '';

    const fragment = document.createDocumentFragment();
    state.chapters.forEach((ch) => {
        const item = document.createElement('div');
        item.className = 'chapter-item';
        item.dataset.chapterId = ch.chapter_id;
        item.dataset.index = ch.chapter_index;

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'chapter-checkbox';
        checkbox.dataset.chapterId = ch.chapter_id;
        checkbox.addEventListener('change', function() {
            if (this.checked) {
                state.selectedChapters.add(ch.chapter_id);
                item.classList.add('selected');
            } else {
                state.selectedChapters.delete(ch.chapter_id);
                item.classList.remove('selected');
            }
            // 用户手动操作后清除失败高亮，并退出补全模式（选择已变更）
            item.classList.remove('failed');
            state.supplementMode = false;
            updateChapterCount();
        });

        const idx = document.createElement('span');
        idx.className = 'chapter-index';
        idx.textContent = ch.chapter_index;

        const title = document.createElement('span');
        title.className = 'chapter-title-text';
        title.textContent = ch.chapter_title;
        title.title = ch.chapter_title;

        item.appendChild(checkbox);
        item.appendChild(idx);
        item.appendChild(title);

        item.addEventListener('click', function(e) {
            if (e.target !== checkbox) {
                checkbox.checked = !checkbox.checked;
                checkbox.dispatchEvent(new Event('change'));
            }
        });

        fragment.appendChild(item);
    });

    chapterList.appendChild(fragment);
    updateChapterCount();
}

function updateChapterCount() {
    const countInfo = document.getElementById('chapterCountInfo');
    const total = state.chapters.length;
    const selected = state.selectedChapters.size;
    if (total > 0) {
        countInfo.style.display = '';
        countInfo.textContent = `共 ${total} 章 | 已选 ${selected} 章`;
    } else {
        countInfo.style.display = 'none';
    }
}

function selectAllChapters() {
    state.chapters.forEach(ch => state.selectedChapters.add(ch.chapter_id));
    document.querySelectorAll('.chapter-checkbox').forEach(cb => {
        cb.checked = true;
        cb.closest('.chapter-item').classList.add('selected');
    });
    state.supplementMode = false;
    updateChapterCount();
}

function invertSelection() {
    document.querySelectorAll('.chapter-checkbox').forEach(cb => {
        cb.checked = !cb.checked;
        const id = cb.dataset.chapterId;
        if (cb.checked) {
            state.selectedChapters.add(id);
            cb.closest('.chapter-item').classList.add('selected');
        } else {
            state.selectedChapters.delete(id);
            cb.closest('.chapter-item').classList.remove('selected');
        }
    });
    state.supplementMode = false;
    updateChapterCount();
}

function clearSelection() {
    state.selectedChapters.clear();
    document.querySelectorAll('.chapter-checkbox').forEach(cb => {
        cb.checked = false;
        cb.closest('.chapter-item').classList.remove('selected');
    });
    state.supplementMode = false;
    updateChapterCount();
}

/* ====================================================================
   Download
   ==================================================================== */
async function handleDownload() {
    if (state.downloading) return;
    if (!state.novelId) {
        showToast('请先选择小说', 'warning');
        return;
    }
    if (state.selectedChapters.size === 0) {
        showToast('请至少选择一个章节', 'warning');
        return;
    }

    // Ask for save directory
    let saveDir;
    try {
        saveDir = await window.pywebview.api.select_save_dir();
        if (!saveDir) {
            showToast('已取消下载', 'warning');
            return;
        }
    } catch (e) {
        showToast('选择目录失败: ' + (e.message || e), 'error');
        return;
    }

    state.downloading = true;
    state.paused = false;
    const downloadBtn = document.getElementById('downloadBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resumeBtn = document.getElementById('resumeBtn');
    const progressSection = document.getElementById('progressSection');

    downloadBtn.disabled = true;
    downloadBtn.innerHTML = '<div class="spinner" style="width:14px;height:14px;border-width:2px;"></div> 下载中...';
    pauseBtn.classList.remove('hidden');
    resumeBtn.classList.add('hidden');
    cancelBtn.classList.remove('hidden');
    progressSection.classList.add('active');

    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('progressText').textContent = '准备下载...';
    document.getElementById('progressEta').textContent = '';
    document.getElementById('progressPercent').textContent = '0%';

    addLog(`开始下载: ${state.novelTitle}, ${state.selectedChapters.size}章 -> ${saveDir}`, 'info');

    // Auto-expand log
    if (!state.logExpanded) {
        toggleLog();
    }

    try {
        const sourceKey = getSelectedSourceKey();
        const chapterIds = Array.from(state.selectedChapters);
        // 补全模式（更新小说后选中缺失章节直接下载）：追加到已有文件而非覆盖
        const appendMode = !!state.supplementMode;
        if (appendMode) {
            addLog('补全模式：将追加到已有文件，不覆盖已下载内容', 'info');
        }
        state.supplementMode = false; // 一次性标志，使用后立即重置
        // download() 立即返回 {status:'started'}，实际进度通过 onProgress 回调推送
        const result = await window.pywebview.api.download(state.novelId, chapterIds, saveDir, sourceKey, appendMode);

        if (result && result.error) {
            showToast('下载失败: ' + result.error, 'error');
            addLog('下载失败: ' + result.error, 'error');
            // 恢复 UI 状态
            state.downloading = false;
            state.paused = false;
            downloadBtn.disabled = false;
            downloadBtn.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8M4 7l4 4 4-4"/><path d="M2 12v1.5A1.5 1.5 0 003.5 15h9a1.5 1.5 0 001.5-1.5V12"/></svg> 开始下载';
            pauseBtn.classList.add('hidden');
            resumeBtn.classList.add('hidden');
            cancelBtn.classList.add('hidden');
        } else {
            // 下载已启动，UI 状态由 onProgress 回调在完成时重置
            showToast('下载已开始', 'info');
        }
    } catch (e) {
        showToast('下载出错: ' + (e.message || e), 'error');
        addLog('下载异常: ' + (e.message || e), 'error');
        // 恢复 UI 状态
        state.downloading = false;
        state.paused = false;
        downloadBtn.disabled = false;
        downloadBtn.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8M4 7l4 4 4-4"/><path d="M2 12v1.5A1.5 1.5 0 003.5 15h9a1.5 1.5 0 001.5-1.5V12"/></svg> 开始下载';
        pauseBtn.classList.add('hidden');
        resumeBtn.classList.add('hidden');
        cancelBtn.classList.add('hidden');
    }
    // 注意：不在此处重置下载状态，由 onProgress(current===total) 时负责收尾
}

async function handleCancel() {
    try {
        await window.pywebview.api.cancel_download();
        if (state.batchDownloading) {
            state.batchCancel = true;
            state.batchDownloading = false;
            showToast('已取消批量下载', 'warning');
            addLog('用户取消了批量下载', 'warning');
        } else {
            showToast('已取消下载', 'warning');
            addLog('用户取消了下载', 'warning');
        }
        finishDownloadUI(false);
    } catch (e) {
        showToast('取消失败: ' + (e.message || e), 'error');
    }
}

/* ====================================================================
   Progress / Log Callbacks (called from Python via evaluate_js)
   ==================================================================== */
function onProgress(data) {
    const progressSection = document.getElementById('progressSection');
    progressSection.classList.add('active');

    const percent = data.percent || 0;
    document.getElementById('progressBar').style.width = percent + '%';
    document.getElementById('progressPercent').textContent = Math.round(percent) + '%';

    const current = data.current || 0;
    const total = data.total || '?';
    let mainText = `下载中: 第${current}/${total}章`;
    if (data.chapter_title) {
        mainText = `下载中: ${data.chapter_title} (${current}/${total})`;
    }
    document.getElementById('progressText').textContent = mainText;

    // 显示预计剩余时间与速度
    const etaParts = [];
    if (data.eta) {
        etaParts.push('预计剩余: ' + data.eta);
    }
    if (data.speed_text) {
        etaParts.push('速度: ' + data.speed_text);
    }
    document.getElementById('progressEta').textContent = etaParts.join(' | ');

    // 检测下载完成（current >= total）
    if (typeof total === 'number' && current >= total && current > 0) {
        finishDownloadUI(true);
    }
}

/** 下载完成/取消后的 UI 收尾 */
function finishDownloadUI(success) {
    // 批量下载中：仅完成当前这本，保持按钮可见，让下一本继续
    if (state.batchDownloading) {
        state.paused = false;
        const pauseBtn = document.getElementById('pauseBtn');
        const resumeBtn = document.getElementById('resumeBtn');
        if (pauseBtn) pauseBtn.classList.add('hidden');
        if (resumeBtn) resumeBtn.classList.add('hidden');
        return;
    }
    state.downloading = false;
    state.paused = false;
    state.supplementMode = false;
    const downloadBtn = document.getElementById('downloadBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resumeBtn = document.getElementById('resumeBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    if (downloadBtn) {
        downloadBtn.disabled = false;
        downloadBtn.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8M4 7l4 4 4-4"/><path d="M2 12v1.5A1.5 1.5 0 003.5 15h9a1.5 1.5 0 001.5-1.5V12"/></svg> 开始下载';
    }
    if (pauseBtn) pauseBtn.classList.add('hidden');
    if (resumeBtn) resumeBtn.classList.add('hidden');
    if (cancelBtn) cancelBtn.classList.add('hidden');
    // 标记历史需刷新
    state.historyLoaded = false;
}

function onLog(data) {
    addLog(data.message || data, data.level || 'info');
}

/**
 * 下载完成后由 Python 推送彻底失败的章节列表
 * - 批量下载模式：仅记录日志，不改动章节列表（章节列表非当前小说）
 * - 单本下载模式：自动选中失败章节复选框并高亮，便于用户手动重试
 */
function onFailedChapters(data) {
    const chapters = (data && data.chapters) || [];
    if (chapters.length === 0) return;

    // 批量下载中只记录日志
    if (state.batchDownloading) {
        const titles = chapters.map(c => c.chapter_title || c.chapter_id).slice(0, 5).join('、');
        const more = chapters.length > 5 ? ` 等 ${chapters.length} 章` : '';
        addLog('彻底失败章节: ' + titles + more, 'error');
        return;
    }

    // 单本下载：仅当章节列表展示的就是这本小说时才自动选中
    if (!state.novelId || String(data.novel_id) !== String(state.novelId)) {
        addLog('检测到 ' + chapters.length + ' 章下载失败（详见日志）', 'error');
        return;
    }

    const failedIdSet = new Set(chapters.map(c => String(c.chapter_id)));
    let firstFailedEl = null;
    let selectedCount = 0;

    document.querySelectorAll('.chapter-checkbox').forEach(cb => {
        const cid = String(cb.dataset.chapterId);
        if (failedIdSet.has(cid)) {
            const item = cb.closest('.chapter-item');
            cb.checked = true;
            if (item) item.classList.add('selected', 'failed');
            state.selectedChapters.add(cid);
            selectedCount++;
            if (!firstFailedEl) firstFailedEl = item;
        }
    });

    updateChapterCount();
    // 进入补全模式：重试失败章节时追加到已有文件，避免覆盖已下载内容
    state.supplementMode = true;

    const titles = chapters.map(c => c.chapter_title || c.chapter_id).slice(0, 3).join('、');
    const more = chapters.length > 3 ? ` 等 ${chapters.length} 章` : '';
    showToast('检测到 ' + chapters.length + ' 章下载失败，已自动选中（' + titles + more + '）', 'warning');
    addLog('已自动选中 ' + selectedCount + ' 个失败章节，可重新点击下载重试', 'warning');

    // 滚动到第一个失败章节
    if (firstFailedEl && firstFailedEl.scrollIntoView) {
        firstFailedEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

async function loadCoverCacheInfo() {
    const el = document.getElementById('coverCacheInfo');
    if (!el) return;
    el.textContent = '加载中...';
    try {
        const info = await window.pywebview.api.get_cover_cache_info();
        if (info && info.error) {
            el.textContent = '获取失败: ' + info.error;
            return;
        }
        if (!info) {
            el.textContent = '0 条 · 0 KB';
            return;
        }
        const size = info.size_kb < 1024 ? info.size_kb + ' KB' : (info.size_kb / 1024).toFixed(2) + ' MB';
        el.textContent = (info.count || 0) + ' 条 · ' + size;
    } catch (e) {
        el.textContent = '获取失败';
    }
}

        tab.classList.toggle('active', tab.dataset.view === viewName);

        loadFavorites();

        loadHistory();
    } else if (viewName === 'paused' && !state.pausedLoaded) {
        loadPausedTasks();
    }
}

/** 后台预获取封面并更新已渲染的卡片图片 */
async function prefetchAndApplyCovers(items, grid) {
    // 找出没有封面的书
    const needCovers = items.filter(n => !n.cover_url);
    if (needCovers.length === 0) return;
    try {
        addLog('正在获取封面: ' + needCovers.length + ' 本...', 'info');
        const coversJson = JSON.stringify(needCovers.map(n => ({
            novel_id: n.novel_id,
            title: n.title,
            cover_url: n.cover_url || '',
            source_key: n.source_key || n.source || 'biquge',
        })));
        const covers = await window.pywebview.api.prefetch_covers(coversJson, 'biquge');
        if (!covers) return;
        // 更新已渲染的卡片图片
        Object.keys(covers).forEach(novelId => {
            const url = covers[novelId];
            if (!url) return;
            // 找到对应卡片中的占位符，替换为图片
            const card = grid.querySelector('.novel-grid-card[data-novel-id="' + novelId + '"]');
            if (!card) return;
            const ph = card.querySelector('.grid-card-cover-placeholder');
            if (ph) {
                const img = document.createElement('img');
                img.className = 'grid-card-cover';
                img.src = url;
                img.onerror = function() {
                    // 加载失败保持占位符
                };
                ph.replaceWith(img);
            }
        });
        addLog('封面获取完成', 'success');
    } catch (e) {
        console.warn('封面预获取失败:', e);
    }
}

async function loadCategories() {
    const section = document.getElementById('categoriesSection');
    try {
        const result = await window.pywebview.api.get_categories();
        if (!result || result.length === 0) {
            section.innerHTML = '<span style="color:var(--text-muted);font-size:12px;">暂无分类</span>';
            return;
        }
        section.innerHTML = '';
        result.forEach(src => {
            if (src.categories) {
                src.categories.forEach(cat => {
                    const chip = document.createElement('span');
                    chip.className = 'category-chip';
                    chip.textContent = cat.name;
                    chip.title = (src.source_name || src.source || '') + ' - ' + cat.name;
                    chip.addEventListener('click', function() {
                        // 传 cat.key 给 get_rankings（如 'xuanhuan'），失败回退到搜索 cat.name
                        searchByCategory(src.source, cat.key, cat.name);
                    });
                    section.appendChild(chip);
                });
            }
        });
    } catch (e) {

async function batchDownload() {
    const checkboxes = document.querySelectorAll('#cartList .chapter-checkbox');
    const selected = [];
    checkboxes.forEach(cb => {
        if (cb.checked) selected.push(state.cart[parseInt(cb.dataset.cartIndex)]);
    });
    if (selected.length === 0) {
        showToast('请至少选择一本小说', 'warning');
        return;
    }
    let saveDir;
    try {
        saveDir = await window.pywebview.api.select_save_dir();
        if (!saveDir) {
            showToast('已取消下载', 'warning');
            return;
        }
    } catch (e) {
        showToast('选择目录失败: ' + (e.message || e), 'error');
        return;
    }
    closeCart();
    state.batchDownloading = true;
    state.batchCancel = false;
    // 禁用单本下载按钮，避免批量进行中误触发冲突
    const downloadBtn = document.getElementById('downloadBtn');
    if (downloadBtn) downloadBtn.disabled = true;
    showToast('开始批量下载 ' + selected.length + ' 本小说', 'info');
    addLog('批量下载开始: ' + selected.length + ' 本小说 -> ' + saveDir, 'info');
    if (!state.logExpanded) toggleLog();

    let successCount = 0;
    for (let i = 0; i < selected.length; i++) {
        if (state.batchCancel) {
            addLog('批量下载已取消', 'warning');
            break;
        }
        const novel = selected[i];
        addLog('[' + (i + 1) + '/' + selected.length + '] 正在下载: ' + novel.title, 'info');

        // 重置进度条，显示取消按钮（暂停/取消在批量中可用）
        const progressSection = document.getElementById('progressSection');
        const cancelBtn = document.getElementById('cancelBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        if (progressSection) progressSection.classList.add('active');
        if (cancelBtn) cancelBtn.classList.remove('hidden');
        if (pauseBtn) pauseBtn.classList.remove('hidden');
        document.getElementById('progressBar').style.width = '0%';
        document.getElementById('progressPercent').textContent = '0%';
        document.getElementById('progressText').textContent = '[' + (i + 1) + '/' + selected.length + '] ' + novel.title;
        document.getElementById('progressEta').textContent = '';

        let sourceKey = novel.source_key || novel.source || 'biquge';
        let novelId = novel.novel_id;

        // 处理 sudugu 源：用书名搜索真实源
        if (sourceKey === 'sudugu') {
            try {
                const searchResults = await window.pywebview.api.search(novel.title, 'biquge');
                if (searchResults && !searchResults.error && searchResults.length > 0) {
                    novelId = searchResults[0].novel_id;
                    sourceKey = searchResults[0].source_key || searchResults[0].source || 'biquge';
                    addLog('《' + novel.title + '》已匹配到 ' + sourceKey, 'info');
                } else {
                    addLog('未找到《' + novel.title + '》的可用源，跳过', 'warning');
                    continue;
                }
            } catch (e) {
                addLog('搜索《' + novel.title + '》失败: ' + (e.message || e), 'error');
                continue;
            }
        }

        try {
            const chapters = await window.pywebview.api.get_chapters(novelId, sourceKey);
            if (!chapters || chapters.error || chapters.length === 0) {
                addLog('无章节: ' + novel.title, 'warning');
                continue;
            }
            const chapterIds = chapters.map(ch => ch.chapter_id);
            const result = await window.pywebview.api.download(novelId, chapterIds, saveDir, sourceKey);
            if (result && result.error) {
                addLog('下载失败: ' + novel.title + ' - ' + result.error, 'error');
                continue;
            }
            // 等待当前小说下载完成后再开始下一本
            await waitForDownloadComplete();
            addLog('完成: ' + novel.title, 'success');
            successCount++;
        } catch (e) {
            addLog('下载失败: ' + novel.title + ' - ' + (e.message || e), 'error');
        }
    }
    state.batchDownloading = false;
    // 批量结束后做最终 UI 清理（隐藏按钮、恢复下载按钮）
    finishDownloadUI(false);
    if (state.batchCancel) {
        showToast('批量下载已取消', 'warning');
    } else {
        showToast('批量下载完成，成功 ' + successCount + '/' + selected.length + ' 本', 'success');
    }
    addLog('批量下载结束: 成功 ' + successCount + '/' + selected.length + ' 本', 'success');
    state.historyLoaded = false;
}

/** 轮询等待当前下载线程完成 */
function waitForDownloadComplete() {
    return new Promise((resolve) => {
        // 先等 2 秒让下载线程真正启动
        setTimeout(() => pollDownload(resolve), 2000);
    });
}

async function pollDownload(resolve) {
    try {
        const status = await window.pywebview.api.get_download_status();
        if (!status.active) {
            resolve();
        } else {
            setTimeout(() => pollDownload(resolve), 1000);
        }
    } catch (e) {
        resolve();
    }
}

async function loadHistory() {
    const list = document.getElementById('historyList');

        state.historyLoaded = true;
        const items = result || [];

            return;
        }
        renderHistory(items);

        list.innerHTML = '';

function renderHistory(items) {
    const list = document.getElementById('historyList');
    const empty = document.getElementById('historyEmpty');
    list.innerHTML = '';
    empty.style.display = 'none';
    items.forEach(item => {
        const el = document.createElement('div');
        el.className = 'list-item';
        el.style.cursor = 'pointer';
        const info = document.createElement('div');
        info.className = 'list-item-info';
        const date = item.created_at ? formatHistoryDate(item.created_at) : '';
        info.innerHTML = '<div class="list-item-title">' + escapeHtml(item.title || '未知') + '</div>' +
            '<div class="list-item-meta">' + escapeHtml(item.source || '') +
            ' | ' + (item.chapter_success || 0) + '/' + (item.chapter_total || 0) + ' 章' +
            (date ? ' | ' + date : '') +
            (item.save_path ? ' | ' + escapeHtml(item.save_path) : '') + '</div>';
        el.appendChild(info);
        const statusEl = document.createElement('span');
        const status = (item.status || '').toLowerCase();
        const statusClass = status === 'completed' ? 'completed' : status === 'paused' ? 'paused' :
            status === 'failed' ? 'failed' : 'started';
        statusEl.className = 'list-status ' + statusClass;
        statusEl.textContent = item.status || '进行中';
        el.appendChild(statusEl);
        const actions = document.createElement('div');
        actions.className = 'list-item-actions';
        const openBtn = document.createElement('button');
        openBtn.className = 'list-action-btn';
        openBtn.textContent = '打开';
        openBtn.onclick = function(e) { e.stopPropagation(); reopenFromHistory(item); };
        const delBtn = document.createElement('button');
        delBtn.className = 'list-action-btn danger';
        delBtn.textContent = '删除';
        delBtn.onclick = function(e) { e.stopPropagation(); deleteHistoryItem(item.id); };
        actions.appendChild(openBtn);
        actions.appendChild(delBtn);
        el.appendChild(actions);
        el.addEventListener('click', function() { reopenFromHistory(item); });
        list.appendChild(el);
    });
}

function formatHistoryDate(dateStr) {
    if (!dateStr) return '';
    try {
        const d = new Date(dateStr);
        if (isNaN(d)) return dateStr;
        return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + d.toTimeString().slice(0, 5);
    } catch (e) { return dateStr; }
}
